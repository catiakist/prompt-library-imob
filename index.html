<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biblioteca de Prompts · Imóveis IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#101010;--s2:#181818;--s3:#222;
  --b1:#2a2a2a;--b2:#333;
  --t1:#f0f0f0;--t2:#999;--t3:#555;
  --accent:#e8ff47;--accent2:#c8df20;--danger:#ff4757;--ok:#2ecc71;
  --r:8px;--rl:12px;
}
body{background:var(--bg);color:var(--t1);font-family:'Syne',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
input,textarea,select,button{font-family:'Syne',sans-serif;font-size:13px;outline:none;border:none;background:none;color:var(--t1)}
input,textarea,select{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 14px;width:100%;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,71,.07)}
select option{background:var(--s2)}
textarea{resize:vertical;min-height:120px;line-height:1.6}
::placeholder{color:var(--t3)}
button{cursor:pointer;border-radius:var(--r);padding:8px 16px;border:1px solid var(--b1);background:var(--s1);color:var(--t2);transition:all .15s;white-space:nowrap;font-weight:500}
button:hover:not(:disabled){border-color:var(--b2);color:var(--t1);background:var(--s2)}
button:active:not(:disabled){transform:scale(.98)}
button:disabled{opacity:.35;cursor:not-allowed}
.btn-p{background:var(--accent);color:#080808;border-color:var(--accent);font-weight:700}
.btn-p:hover:not(:disabled){background:var(--accent2);border-color:var(--accent2);color:#080808}
.btn-d{color:var(--danger);border-color:transparent;background:transparent}
.btn-d:hover:not(:disabled){background:rgba(255,71,87,.08);border-color:rgba(255,71,87,.25)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#wrap{max-width:720px;margin:0 auto;padding:0 20px 100px}
.hdr{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--b1);padding:22px 0 14px;margin-bottom:18px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.title{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
.title em{color:var(--accent);font-style:normal}
.stats{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.stat{font-size:10px;color:var(--t3);background:var(--s2);border:1px solid var(--b1);padding:2px 9px;border-radius:99px}
.stat b{color:var(--t2);font-weight:600}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{padding-left:36px}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:15px;pointer-events:none}
.frow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.flbl{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;min-width:30px}
.fb{font-size:10px;padding:3px 10px;border-radius:99px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;font-weight:500}
.fb.on{font-weight:700}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:16px 18px;margin-bottom:9px;transition:border-color .2s}
.card:hover{border-color:var(--b2)}
.card.open{border-color:var(--b2)}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.card-desc{font-size:13px;font-weight:500;line-height:1.5;color:var(--t1);margin:0 0 8px}
.tag{font-size:10px;color:var(--t3);background:var(--s3);padding:2px 8px;border-radius:99px;border:1px solid var(--b1)}
.desc-box{background:var(--s2);border-radius:var(--r);padding:12px 14px;border-left:3px solid var(--accent);margin-bottom:14px}
.desc-box .lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:5px}
.desc-box .txt{font-size:13px;line-height:1.6;color:var(--t1);font-weight:500}
pre{font-family:'DM Mono',monospace;font-size:11.5px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;white-space:pre-wrap;word-break:break-word;line-height:1.7;color:var(--t2)}
.sec{margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.copy-btn{font-size:10px;padding:3px 10px;border-radius:var(--r);background:var(--s3);border-color:var(--b1);color:var(--t3);font-weight:500}
.copy-btn.ok{color:var(--ok);border-color:rgba(46,204,113,.3)}
hr{border:none;border-top:1px solid var(--b1);margin:14px 0}
.acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.add-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:18px}
.lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:6px}
.arow{margin-bottom:12px}
.arow p{font-size:13px;color:var(--t2);line-height:1.6;margin-top:4px}
.empty{text-align:center;padding:70px 20px;color:var(--t3)}
.empty h3{font-size:16px;color:var(--t2);font-weight:500;margin-bottom:6px}
.empty p{font-size:12px}
@media(max-width:600px){
  #wrap{padding:0 12px 80px}
  .hdr{padding:16px 0 12px}
  .title{font-size:19px}
  .hdr-top{flex-wrap:wrap;gap:8px}
  .card{padding:13px}
}
</style>
</head>
<body>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="title">Prompts <em>·</em> Imóveis IA</div>
        <div class="stats" id="stats"></div>
      </div>
      <button id="btn-tog" onclick="toggleView()">+ Novo prompt</button>
    </div>
    <div id="filters">
      <div class="search-wrap">
        <span class="s-icon">⌕</span>
        <input type="text" id="search" placeholder="Buscar por descrição, tag ou palavra-chave..." oninput="onSearch(this.value)"/>
      </div>
      <div class="frow"><span class="flbl">Cat.</span><div id="cf"></div></div>
      <div class="frow"><span class="flbl">Tool</span><div id="tf"></div></div>
    </div>
  </div>

  <div id="add-area" style="display:none">
    <div class="add-panel">
      <label class="lbl">Cole o prompt (inglês, português ou espanhol)</label>
      <textarea id="nt" placeholder="Paste your prompt here..." oninput="st.newText=this.value"></textarea>
      <div style="margin-top:12px">
        <button class="btn-p" id="btn-an" onclick="doAnalyze()" style="width:100%;padding:11px;font-size:13px">Analisar e traduzir com IA</button>
      </div>
      <p id="aerr" style="display:none;color:var(--danger);font-size:12px;margin-top:8px"></p>
      <div id="ares" style="display:none;margin-top:18px;border-top:1px solid var(--b1);padding-top:18px">
        <div class="desc-box" style="margin-bottom:14px">
          <span class="lbl">O que este prompt gera</span>
          <div class="txt" id="a-desc"></div>
        </div>
        <div class="arow"><span class="lbl">Tradução PT-BR</span><p id="a-tr"></p></div>
        <div class="arow">
          <span class="lbl">Categoria · Ferramenta</span>
          <div id="a-bdg" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"></div>
        </div>
        <div class="arow" id="a-tgw">
          <span class="lbl">Tags</span>
          <div id="a-tg" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px"></div>
        </div>
        <button class="btn-p" onclick="saveNew()" style="width:100%;padding:11px;font-size:13px;margin-top:4px">Salvar na biblioteca</button>
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>
<script>
const SK='prompt-library-imob-v2';
const CATS=['Todos','Exterior','Interior','Aéreo','Movimento','Detalhe','Texto/Animação','Geral'];
const TOOLS=['Todos','Kling','Nano Banana','VEO3/VO3','Sora','HeyGen','Grok','Geral'];
const CS={Exterior:{bg:'#0f2a1a',c:'#4dff91'},Interior:{bg:'#0d1f35',c:'#5ba8ff'},Aéreo:{bg:'#1a1035',c:'#a78bff'},Movimento:{bg:'#2a1800',c:'#ffaa44'},Detalhe:{bg:'#2a0d1a',c:'#ff6b9d'},'Texto/Animação':{bg:'#2a1205',c:'#ff7b45'},Geral:{bg:'#1a1a1a',c:'#888'},'Nano Banana':{bg:'#1a1000',c:'#ffcc00'},Kling:{bg:'#1a1035',c:'#a78bff'},'VEO3/VO3':{bg:'#0d1f35',c:'#5ba8ff'},Sora:{bg:'#2a0d1a',c:'#ff6b9d'},HeyGen:{bg:'#2a1800',c:'#ffaa44'},Grok:{bg:'#0f2a1a',c:'#4dff91'}};
let st={prompts:[],view:'list',search:'',selCat:'Todos',selTool:'Todos',expandedId:null,newText:'',analysis:null,copiedKey:null};
const save=()=>{try{localStorage.setItem(SK,JSON.stringify(st.prompts));}catch{}};
const load=()=>{try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch{}return null;};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const bdg=(l)=>{const s=CS[l]||{bg:'#1a1a1a',c:'#888'};return `<span class="badge" style="background:${s.bg};color:${s.c}">${l}</span>`;};
const tpill=t=>`<span class="tag">#${t}</span>`;
const cpBtn=(text,key,lbl='Copiar')=>{const ok=st.copiedKey===key;return `<button class="copy-btn${ok?' ok':''}" onclick="doCopy(${JSON.stringify(text)},${JSON.stringify(key)})">${ok?'✓ Copiado':lbl}</button>`;};
const filt=()=>{const q=st.search.toLowerCase();return st.prompts.filter(p=>{const mq=!q||(p.description||'').toLowerCase().includes(q)||(p.original||'').toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q));return mq&&(st.selCat==='Todos'||p.category===st.selCat)&&(st.selTool==='Todos'||p.tool===st.selTool);});};

function renderStats(){
  const f=filt();
  document.getElementById('stats').innerHTML=`<span class="stat"><b>${st.prompts.length}</b> prompts</span><span class="stat"><b>${st.prompts.filter(p=>p.tool==='Kling').length}</b> Kling</span><span class="stat"><b>${st.prompts.filter(p=>p.tool==='Nano Banana').length}</b> Nano Banana</span>${(st.search||st.selCat!=='Todos'||st.selTool!=='Todos')?`<span class="stat" style="background:#1a1a00;border-color:#333300;color:#e8ff47"><b>${f.length}</b> visíveis</span>`:''}`;
}

function renderFilters(){
  document.getElementById('cf').innerHTML=CATS.map(c=>{const s=CS[c];const on=st.selCat===c;const bg=on&&s?s.bg:'transparent',cl=on&&s?s.c:'#555',br=on&&s?s.c:'#2a2a2a';return `<button class="fb${on?' on':''}" style="background:${bg};color:${cl};border-color:${br}" onclick="setCat('${c}')">${c}</button>`;}).join('');
  document.getElementById('tf').innerHTML=TOOLS.map(t=>{const s=CS[t];const on=st.selTool===t;const bg=on&&s?s.bg:'transparent',cl=on&&s?s.c:'#555',br=on&&s?s.c+'60':'#2a2a2a';return `<button class="fb${on?' on':''}" style="background:${bg};color:${cl};border-color:${br}" onclick="setTool('${t}')">${t}</button>`;}).join('');
}

function renderList(){
  renderStats();
  const filtered=filt();
  const el=document.getElementById('list');
  if(!el)return;
  if(filtered.length===0){el.innerHTML=`<div class="empty"><h3>${st.prompts.length===0?'Biblioteca vazia':'Nenhum resultado'}</h3><p>${st.prompts.length===0?'Clique em + Novo prompt para começar.':'Tente outros filtros ou termos de busca.'}</p></div>`;return;}
  el.innerHTML=filtered.map(p=>{
    const isExp=st.expandedId===p.id;
    const tags=(p.tags||[]).map(tpill).join(' ');
    let exp='';
    if(isExp){
      const hasTr=p.translation&&p.translation!==p.original;
      const vars=p.variations||[];
      exp=`<hr/>
      <div class="desc-box">
        <span class="lbl">O que este prompt gera</span>
        <div class="txt">${esc(p.description)}</div>
      </div>
      <div class="sec"><div class="sec-hdr"><span class="sec-lbl">Prompt completo</span>${cpBtn(p.original,p.id+'-o')}</div><pre>${esc(p.original)}</pre></div>
      ${hasTr?`<div class="sec"><div class="sec-hdr"><span class="sec-lbl">Tradução PT-BR</span>${cpBtn(p.translation,p.id+'-t')}</div><pre>${esc(p.translation)}</pre></div>`:''}
      ${vars.length?`<div class="sec"><span class="sec-lbl" style="display:block;margin-bottom:10px">Variações</span>${vars.map((v,i)=>`<div style="margin-bottom:10px"><div class="sec-hdr"><span class="sec-lbl" style="color:#444">Variação ${i+1}</span><div style="display:flex;gap:5px">${cpBtn(v,p.id+'-v'+i)}<button class="btn-d" style="font-size:10px;padding:3px 8px" onclick="delVar('${p.id}',${i})">Excluir</button></div></div><pre>${esc(v)}</pre></div>`).join('')}</div>`:''}
      <hr/><div class="acts">
        <button style="font-size:11px" onclick="addVar('${p.id}')">+ Variação</button>
        <button class="btn-d" style="font-size:11px;margin-left:auto" onclick="delPrompt('${p.id}')">Excluir prompt</button>
      </div>`;
    }
    return `<div class="card${isExp?' open':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px">${bdg(p.category)} ${bdg(p.tool)}</div>
          <p class="card-desc">${esc(p.description)}</p>
          ${tags?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">${tags}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${cpBtn(p.original,p.id+'-q')}
          <button onclick="togExp('${p.id}')" style="font-size:11px;padding:3px 10px;${isExp?'color:var(--accent);border-color:var(--accent);':''}">${isExp?'Fechar':'Ver'}</button>
        </div>
      </div>${exp}</div>`;
  }).join('');
}

function render(){renderFilters();renderList();}
window.toggleView=()=>{
  st.view=st.view==='add'?'list':'add';
  const isAdd=st.view==='add';
  document.getElementById('add-area').style.display=isAdd?'block':'none';
  document.getElementById('filters').style.display=isAdd?'none':'block';
  document.getElementById('list').style.display=isAdd?'none':'block';
  document.getElementById('btn-tog').textContent=isAdd?'Cancelar':'+ Novo prompt';
  if(isAdd){document.getElementById('ares').style.display='none';document.getElementById('nt').value='';st.newText='';}
};
window.onSearch=v=>{st.search=v;renderList();};
window.setCat=v=>{st.selCat=v;renderFilters();renderList();};
window.setTool=v=>{st.selTool=v;renderFilters();renderList();};
window.togExp=id=>{st.expandedId=st.expandedId===id?null:id;renderList();};
window.doCopy=(text,key)=>{navigator.clipboard.writeText(text);st.copiedKey=key;renderList();setTimeout(()=>{st.copiedKey=null;renderList();},2000);};
window.delPrompt=id=>{if(!confirm('Excluir este prompt permanentemente?'))return;st.prompts=st.prompts.filter(p=>p.id!==id);st.expandedId=null;save();renderList();};
window.addVar=id=>{const v=prompt('Cole o prompt variante:');if(!v||!v.trim())return;st.prompts=st.prompts.map(p=>p.id!==id?p:{...p,variations:[...(p.variations||[]),v.trim()]});save();renderList();};
window.delVar=(pid,idx)=>{st.prompts=st.prompts.map(p=>p.id!==pid?p:{...p,variations:p.variations.filter((_,i)=>i!==idx)});save();renderList();};
window.doAnalyze=async()=>{
  if(!st.newText.trim())return;
  const btn=document.getElementById('btn-an');
  btn.textContent='Analisando com IA...';btn.disabled=true;
  document.getElementById('aerr').style.display='none';
  document.getElementById('ares').style.display='none';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'Você é especialista em prompts de vídeo/imagem imobiliário com IA (Kling, VEO3, Sora, HeyGen, Grok, Nano Banana). Analise o prompt e retorne APENAS JSON válido, sem texto extra, sem markdown. Estrutura exata: {"translation":"tradução fiel ao português brasileiro","description":"em 1 ou 2 frases diretas e objetivas: o que este prompt gera visualmente e em qual situação usar","category":"Exterior|Interior|Aéreo|Movimento|Detalhe|Texto/Animação|Geral","tool":"Kling|VEO3/VO3|Sora|HeyGen|Grok|Nano Banana|Geral","tags":["até 5 tags relevantes em português sem #"]}',messages:[{role:'user',content:st.newText.trim()}]})});
    const data=await res.json();
    const a=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    st.analysis=a;
    document.getElementById('a-desc').textContent=a.description;
    document.getElementById('a-tr').textContent=a.translation;
    document.getElementById('a-bdg').innerHTML=`${bdg(a.category)} ${bdg(a.tool)}`;
    const tgEl=document.getElementById('a-tg');
    const tgW=document.getElementById('a-tgw');
    if(a.tags?.length){tgEl.innerHTML=a.tags.map(tpill).join(' ');tgW.style.display='block';}else{tgW.style.display='none';}
    document.getElementById('ares').style.display='block';
  }catch{const e=document.getElementById('aerr');e.textContent='Erro ao analisar. Verifique sua conexão e tente novamente.';e.style.display='block';}
  btn.textContent='Analisar e traduzir com IA';btn.disabled=false;
};
window.saveNew=()=>{
  if(!st.analysis)return;
  const np={id:'u'+Date.now(),original:st.newText.trim(),...st.analysis,variations:[],createdAt:new Date().toISOString()};
  st.prompts=[np,...st.prompts];save();toggleView();renderList();
};

const DATA=[{id:"p001",original:"A câmera começa a partir de uma perspectiva alta e estável de drone, mostrando o terreno sendo limpo por uma motoniveladora. A câmera realiza um zoom lento, contínuo e realista em direção ao trabalhador que está operando a máquina. O zoom é óptico e fisicamente preciso.",translation:"A câmera começa a partir de uma perspectiva alta e estável de drone, mostrando o terreno sendo limpo por uma motoniveladora. A câmera realiza um zoom lento, contínuo e realista em direção ao trabalhador que está operando a máquina. O zoom é óptico e fisicamente preciso.",description:"Zoom cinematográfico de drone descendo progressivamente até o close no operador da motoniveladora. Use para apresentar o início de obras de terraplanagem.",category:"Movimento",tool:"Kling",tags:["drone","operário","motoniveladora","terraplanagem","zoom"]},{id:"p002",original:"Crie um vídeo em timelapse acelerado dos operarios trabalhando na construção dessa casa. A imagem precisa ter o mesmo angulo, a camera fixa em um tripe, sem movimento e sem zoom",translation:"Crie um vídeo em timelapse acelerado dos operarios trabalhando na construção dessa casa. A imagem precisa ter o mesmo angulo, a camera fixa em um tripe, sem movimento e sem zoom",description:"Time-lapse de câmera fixa em tripé mostrando operários construindo uma casa. Câmera sem movimento nem zoom do início ao fim.",category:"Movimento",tool:"Kling",tags:["timelapse","construção","câmera fixa","obra","operários"]},{id:"p003",original:"Start with a completely static, true top-down (nadir) aerial view of pristine, untouched forest terrain. The camera is fully locked: no pan, no tilt, no zoom, no rotation. From the exact center of the frame, ultra-thin, clean, controlled neon linework begins to draw itself precisely over the land surface. First roads, then streets, urban blocks, lot subdivisions and building footprints. Neon color: soft green for preservation areas, pure white for buildings/streets/lots. Glow: clean, low-intensity, sharp edges, no bloom. Terrain fully visible at all times.",translation:"Comece com uma vista aérea top-down totalmente estática de terreno florestal intocado. Câmera completamente travada. Do centro exato do quadro, linhas neon ultra-finas começam a se desenhar com precisão sobre o terreno. Primeiro as vias principais, depois ruas, quadras, subdivisões e implantações. Verde neon para áreas verdes, branco puro para vias e edificações. Brilho limpo de baixa intensidade. Terreno sempre visível.",description:"Câmera top-down estática com linhas neon se desenhando progressivamente para revelar o masterplan sobre o terreno real. Prompt principal para apresentação de loteamentos no Kling.",category:"Texto/Animação",tool:"Kling",tags:["masterplan","neon","top-down","loteamento","linhas","terreno"]},{id:"p004",original:"A single continuous cinematic shot starting with a wide view and ending in a close-up. Wide shot of a large earthmoving site, tractor operating slowly forward. Natural daylight, realistic colors, subtle dust, documentary realism. Camera starts far and wide, performs smooth steady forward push toward the tractor, descending gradually. Near the end, camera reaches the tractor cabin, moving seamlessly into a close-up of the driver's face and hands on the controls. Focused expression, natural skin tones, realistic work clothing. Soft reflections on cabin glass, floating dust particles. Shallow depth of field. Ultra-realistic, cinematic, no cuts.",translation:"Plano-sequência cinematográfico único do plano geral ao close-up. Plano geral amplo de um grande canteiro de terraplanagem, trator se movendo lentamente. Luz natural do dia, realismo documental, poeira sutil. A câmera começa ampla e avança suavemente em direção ao trator descendo gradualmente. No final, a câmera alcança a cabine do trator e entra em close-up no rosto e nas mãos do motorista. Expressão concentrada, tons de pele naturais. Reflexos suaves no vidro, partículas de poeira.",description:"Plano-sequência contínuo do plano geral ao close-up no rosto do tratorista dentro da cabine. Ideal para vídeos documentais de terraplanagem com narrativa humana.",category:"Movimento",tool:"Kling",tags:["trator","terraplanagem","plano-sequência","close-up","obra","documental"]},{id:"p005",original:"A single continuous cinematic shot from aerial to close-up. Opens with high-altitude aerial view of construction site. Camera descends smoothly, tilts forward, reveals plumbing trenches and exposed piping. Flows into medium shot of plumber working on pipes. Realistic tools, pipes, fittings. Natural workwear, gloves, safety details. Final push-in to close-up of plumber's hands and face. Focused expression, detailed hand movement. Shallow depth of field. Soft sunlight highlights dust and surface details. Ultra-realistic, cinematic, no cuts.",translation:"Plano-sequência único do aéreo até o close-up. Abre com vista aérea a grande altitude de canteiro de obras. A câmera desce suavemente e se inclina, revelando trincheiras de encanamento e tubulações expostas. Transita para plano médio do encanador trabalhando nas tubulações. Ferramentas realistas, tubos e conexões visíveis. Final com close-up nas mãos e no rosto do encanador. Profundidade de campo rasa.",description:"Plano-sequência de drone descendo do aéreo até close-up no encanador trabalhando nas instalações hidráulicas da obra.",category:"Movimento",tool:"Kling",tags:["encanador","hidráulica","plano-sequência","obra","infraestrutura","close-up"]},{id:"p006",original:"A single continuous cinematic shot from aerial view to final architectural reveal. Opens with high-altitude aerial view of residential development. Camera descends smoothly, tilts forward, reveals landscape and house. Final: slow elegant push-in toward the front facade. Materials, textures, windows, entrance door and facade geometry clearly defined. Soft cinematic lighting, clean premium residential aesthetic. Ultra-realistic, no cuts.",translation:"Plano-sequência único do aéreo até o reveal final da fachada da casa. Abre com vista aérea de empreendimento residencial. A câmera desce suavemente, inclina-se para frente, revela a paisagem e a casa. Plano final: avanço lento e elegante em direção à fachada frontal. Iluminação cinematográfica suave, estética residencial premium.",description:"Plano-sequência de drone do aéreo até o reveal elegante da fachada completa da casa. Perfeito para o vídeo de lançamento de residências de alto padrão.",category:"Aéreo",tool:"Kling",tags:["reveal","fachada","plano-sequência","drone","residencial","aéreo"]},{id:"p007",original:"Static camera, wide and well-balanced composition. Camera fully locked: no pan, tilt, zoom or rotation. Abstract mood board elements related to interior design orbit gracefully within the space. One by one they slow down and snap into perfect alignment, settling into their final physical positions. Materials, furniture, textures and decorative elements progressively resolve into a cohesive realistic environment. Transformation is calm, elegant, intentional.",translation:"Câmera estática, composição ampla e equilibrada. Câmera completamente travada. Elementos abstratos de moodboard de design de interiores orbitam graciosamente pelo espaço em trajetórias suaves. Um a um, os elementos desaceleram e se encaixam perfeitamente em suas posições físicas finais. A transformação é calma, elegante e intencional.",description:"Câmera estática enquanto elementos de moodboard orbitam e se encaixam progressivamente revelando uma sala de estar de luxo pronta. Para apresentações de interiores premium.",category:"Interior",tool:"Kling",tags:["moodboard","interior","sala de estar","câmera estática","transição","mobiliário"]},{id:"p008",original:"A single continuous cinematic shot from aerial view to final lifestyle action. Opens with high-altitude aerial view of developed residential area. Camera descends and tilts forward. A modern tennis court emerges naturally within the landscape. A woman is playing tennis, movements fluid and athletic. Final: smooth elegant push-in toward the player as she prepares to hit the ball. Dynamic cinematic composition, shallow depth of field.",translation:"Plano-sequência único do aéreo até a ação de lifestyle final. Abre com vista aérea de área residencial desenvolvida. A câmera desce e se inclina, revelando uma quadra de tênis moderna. Uma mulher joga tênis com movimentos fluidos e atléticos. Plano final: avanço elegante em direção à jogadora.",description:"Plano-sequência do aéreo até close na jogadora de tênis do condomínio. Para apresentar amenidades esportivas e lifestyle de alto padrão.",category:"Aéreo",tool:"Kling",tags:["quadra de tênis","lifestyle","plano-sequência","amenidades","condomínio","esporte"]},{id:"p009",original:"A vast barren terrain at sunrise. Cinematic wide shot, low camera angle slowly moving forward. Suddenly, a massive metallic 3D text object drops from the sky at extreme speed. The impact is aggressive and powerful, creating a shockwave, debris, and a large dust explosion. Camera shakes slightly on impact. 3D text is heavy, bold, reflective metal with sharp edges, partially embedding into the ground. Dust particles, rocks and fragments fly in slow motion. Dramatic lighting, high contrast, volumetric dust, 4K, epic atmosphere.",translation:"Terreno árido ao amanhecer. Plano geral cinematográfico, ângulo baixo avançando lentamente. De repente, um enorme texto 3D metálico cai do céu em velocidade extrema. O impacto é agressivo e poderoso, criando uma onda de choque, destroços e grande explosão de poeira. A câmera treme levemente. O texto 3D é pesado, metal reflexivo com bordas afiadas, parcialmente embutido no solo. Poeira, pedras e fragmentos em câmera lenta. Iluminação dramática, 4K.",description:"Texto 3D metálico gigante caindo do céu e impactando o terreno com efeito explosivo épico. Para revelar nome ou slogan de um empreendimento com alto impacto visual.",category:"Texto/Animação",tool:"Kling",tags:["texto 3D","impacto","explosão","dramático","reveal","metálico","épico"]},{id:"p010",original:"Camera executes smooth controlled rightward arc. Building's physical materials gradually dissolve into precise wireframes and exposed structural layers. Four technical architectural models disengage from the façade one after another, rotating outward with subtle mechanical precision. The four models settle into a clean vertical stack, perfectly spaced and aligned.",translation:"A câmera executa um arco suave e controlado para a direita. Os materiais físicos do edifício se dissolvem gradualmente em wireframes precisos e camadas estruturais expostas. Quatro modelos técnicos se destacam da fachada um a um, rotacionando para fora com precisão mecânica sutil. Os quatro modelos se organizam em pilha vertical limpa, perfeitamente espaçada.",description:"Câmera em arco revela camadas estruturais em wireframe com 4 modelos técnicos (massa, estrutura, elétrica, hidráulica) se destacando da fachada em sequência. Para detalhamento BIM.",category:"Detalhe",tool:"Kling",tags:["wireframe","estrutural","BIM","detalhamento","arco de câmera","técnico"]},{id:"p011",original:"Movimento de câmera avançando lentamente em direção à janela, revelando o interior, com movimento cinematográfico suave.",translation:"Movimento de câmera avançando lentamente em direção à janela, revelando o interior, com movimento cinematográfico suave.",description:"Câmera avança suavemente em direção a uma janela revelando o interior do imóvel. Prompt simples e eficaz para apresentações de casas e apartamentos.",category:"Interior",tool:"Kling",tags:["janela","interior","reveal","câmera","residencial"]},{id:"p012",original:"Ultra-realistic aerial composite render placing the residential housing complex from reference @img2 onto the corner lot terrain from reference @img1. Match camera angle to high oblique drone perspective. Adapt scale and orientation to align with streets and sidewalks. Apply realistic ground integration. Late-afternoon daylight, physically correct shadows, soft ambient occlusion. Photorealistic architectural visualization.",translation:"Composição aérea ultra-realista inserindo o complexo residencial da referência @img2 no terreno de esquina da referência @img1. Ângulo de câmera oblíquo alto de drone. Adapte escala e orientação para alinhar com ruas e calçadas. Integração realista ao solo. Luz do fim da tarde, sombras fisicamente corretas.",description:"Composição aérea que insere o projeto render no lote real usando duas imagens de referência. Gera visualização fotorrealista do empreendimento já implantado no terreno.",category:"Aéreo",tool:"Geral",tags:["composição aérea","implantação","render no terreno","drone","fotorrealismo"]},{id:"p013",original:"1 - Limpeza e preparo do lote\n2 - Escavações para fundação\n3 - Execução das fundações\n4 - Baldrame / vigas de fundação\n5 - Aterro interno e compactação\n6 - Execução dos pilares\n7 - Execução das vigas\n8 - Execução das lajes\n9 - Levantamento da alvenaria\n10 - Instalações hidráulicas e elétricas embutidas\n11 - Execução da cobertura\n12 - Chapisco, emboço e reboco\n13 - Instalação dos vidros\n14 - Pintura final e limpeza da obra\n15 - Casa pronta com a família chegando feliz",translation:"Sequência de 15 imagens mostrando todas as etapas construtivas.",description:"Gera 15 imagens sequenciais mostrando cada etapa da construção da casa, do terreno vazio até a família chegando. Perfeito para posts de acompanhamento de obra.",category:"Exterior",tool:"Geral",tags:["evolução da obra","etapas","construção","sequência","família","15 fases"]},{id:"p014",original:"Sketch to Render: Create a highly realistic exterior architectural visualization based on the provided sketch. Concrete pathway in foreground. Right side: dense tropical landscaping. Left side: calm water body with tiled pool finish, koi fish, gentle ripples. Main structure: polished concrete. Distance: sandy beach aligned with building axis. Bright sunny day, cinematic wide-angle composition.",translation:"Crie uma visualização arquitetônica externa altamente realista com base no esboço fornecido. Caminho de concreto no primeiro plano. Lado direito: paisagismo tropical denso. Lado esquerdo: piscina com plantas aquáticas flutuantes e peixes koi. Estrutura principal em concreto polido. Ao fundo, praia de areia alinhada com o eixo do edifício.",description:"Transforma esboço arquitetônico em render exterior fotorrealista de residência de luxo tropical com piscina de koi, concreto polido e praia ao fundo.",category:"Exterior",tool:"Geral",tags:["sketch to render","tropical","concreto polido","piscina koi","praia","luxo"]},{id:"p015",original:"Screenshot to Render: Turn the provided screenshot into an ultra-realistic luxury real estate photography-style rendering with cinematic color grading. Villa in Italy, authentic Mediterranean context. Architecture: polished beige limestone, detailed mouldings, warm soffit lighting. Luxury cars positioned naturally. Foreground road: realistic asphalt with scratches, cracks. Italian landscape: olive trees, cypress, manicured shrubs.",translation:"Transforme o screenshot fornecido em um render hiper-realista no estilo de fotografia imobiliária de luxo, com color grading cinematográfico. Villa na Itália, contexto mediterrâneo autêntico. Arquitetura em calcário bege polido, molduras detalhadas, iluminação quente. Carros de luxo posicionados naturalmente. Via com asfalto realista. Paisagem italiana: oliveiras, ciprestes, arbustos podados.",description:"Transforma screenshot de modelo 3D em render fotorrealista de villa italiana de luxo com contexto mediterrâneo, carros de luxo e color grading cinematográfico.",category:"Exterior",tool:"Geral",tags:["screenshot to render","villa italiana","luxo","mediterrâneo","fotorrealismo","color grading"]},{id:"p016",original:"Transforme a casa da imagem em uma planta em projeção neon, mantendo a construção como é",translation:"Transforme a casa da imagem em uma planta em projeção neon, mantendo a construção como é",description:"Gera uma planta neon da casa a partir da foto, mantendo as proporções originais. Efeito futurista para posts e apresentações de empreendimentos.",category:"Texto/Animação",tool:"Geral",tags:["neon","planta","futurista","projeção","casa"]},{id:"p017",original:"transforma essa casa em maquete 3D colocada em uma mesa grande exposta num estande de vendas imobiliário, com pessoas olhando ao redor",translation:"transforma essa casa em maquete 3D colocada em uma mesa grande exposta num estande de vendas imobiliário, com pessoas olhando ao redor",description:"Gera uma maquete 3D da casa sobre mesa em estande de vendas imobiliário com visitantes ao redor. Para materiais de lançamento de empreendimentos.",category:"Geral",tool:"Geral",tags:["maquete 3D","estande de vendas","lançamento","apresentação"]},{id:"p018",original:"Create a sequence of illustrative timeline diagrams showing the evolution of an urban area. Show the diagrams in top 2D plan view with colors in urban drawings style. Clearly state the years on each diagram along with a short brief of the major event. Show north point.",translation:"Crie uma sequência de diagramas ilustrativos em formato de linha do tempo mostrando a evolução de uma área urbana. Apresente em vista superior 2D com cores no estilo de desenho urbano. Indique claramente os anos em cada diagrama com breve resumo do evento principal. Mostre o norte.",description:"Gera sequência de diagramas de linha do tempo em vista 2D mostrando a evolução histórica de uma área urbana. Para apresentações de projetos urbanísticos.",category:"Geral",tool:"Geral",tags:["timeline","urbanismo","diagrama","evolução urbana","2D","masterplan"]},{id:"p019",original:"Create a 3D site analysis diagram from this aerial image. Use circular isometric base, north to upper right. Desaturated map, buildings in soft gray, vegetation in pastel green, water in light blue. Include N,S,E,W, wind direction with wavy blue arrows and solar path with semi-transparent orange lines. Everything outside the circle must be white.",translation:"Crie um diagrama de análise de terreno em 3D a partir desta imagem aérea. Use base circular isométrica, norte para o canto superior direito. Mapa dessaturado, edifícios em cinza suave, vegetação em verde pastel, água em azul claro. Inclua direções N,S,L,O, vento com setas azuis onduladas e trajetória solar com linhas laranja semitransparentes. Tudo fora do círculo em branco.",description:"Gera diagrama de análise de terreno em 3D isométrico circular com orientação solar, ventilação e mapa dessaturado. Para análise de implantação e apresentações técnicas.",category:"Aéreo",tool:"Geral",tags:["análise de terreno","diagrama 3D","isométrico","urbanismo","solar","ventilação"]},{id:"p020",original:"Create a 2D floor plan based on the diagram provided. Use proper line weights for a professional drawing. Add furniture and draw at the correct scale. Remove all texts.",translation:"Crie uma planta baixa 2D baseada no diagrama fornecido. Use espessuras de linha adequadas para um desenho profissional. Adicione mobiliário e desenhe na escala correta. Remova todos os textos.",description:"Transforma um diagrama simples em planta baixa 2D profissional com mobiliário e espessuras de linha técnicas corretas, sem textos.",category:"Detalhe",tool:"Geral",tags:["planta baixa","2D","mobiliário","profissional","arquitetura"]},{id:"p021",original:"Turn this Google Earth screenshot into a SketchUp 3D model style image. White buildings with black outlines, no colors or textures, with projected shadows. Vegetation in semi-transparent sage green with black outlines.",translation:"Transforme esta captura do Google Earth em imagem no estilo de modelo 3D do SketchUp. Edifícios brancos com contornos pretos, sem cores ou texturas, com sombras projetadas. Vegetação em verde sálvia semitransparente com contornos pretos.",description:"Transforma screenshot do Google Earth em imagem estilo SketchUp 3D com edifícios brancos e contornos pretos. Para análises urbanas e apresentações de contexto de implantação.",category:"Aéreo",tool:"Geral",tags:["SketchUp","Google Earth","modelo 3D","urbano","análise de contexto"]},{id:"p022",original:"Crie 4 diagramas circulares em estilo vetorial urbano: Edifícios em preto, Vegetação em verde, Ruas em azul, Quadras em tons de rosa. Organizados em uma única imagem, fundo branco, com sombras suaves.",translation:"Crie 4 diagramas circulares em estilo vetorial urbano: Edifícios em preto, Vegetação em verde, Ruas em azul, Quadras em tons de rosa. Organizados em uma única imagem, fundo branco, com sombras suaves.",description:"Gera 4 diagramas circulares de análise urbana vetorial com código de cores por elemento. Para apresentações de masterplans e análises de contexto urbano.",category:"Geral",tool:"Geral",tags:["diagrama urbano","circular","vetorial","análise urbana","masterplan"]},{id:"p023",original:"Create a step-by-step form evolution diagram of a mixed-use terraced complex, in BIG Architects style, in four panels on white background, with soft shadows.",translation:"Crie um diagrama de evolução volumétrica passo a passo de um complexo de uso misto em terraços, no estilo BIG Architects, em quatro painéis sobre fundo branco, com sombras suaves.",description:"Gera diagrama de evolução volumétrica em 4 etapas no estilo BIG Architects, mostrando a transformação progressiva da forma arquitetônica. Para apresentações conceituais.",category:"Geral",tool:"Geral",tags:["evolução volumétrica","BIG Architects","diagrama","conceito","forma"]},{id:"p024",original:"Create a realistic aerial view of this location from Google Maps. Remove texts and labels. Show buildings in 3D with correct heights.",translation:"Crie uma vista aérea realista deste local a partir do Google Maps. Remova textos e ícones. Mostre os edifícios em 3D com alturas corretas.",description:"Transforma imagem do Google Maps em vista aérea realista com edifícios em 3D e sem textos ou ícones. Para contextualizar a localização de empreendimentos.",category:"Aéreo",tool:"Geral",tags:["Google Maps","vista aérea","3D","localização","contexto urbano"]},{id:"p025",original:"Crie um render hiper-realista de uma torre de uso misto. Perspectiva baixa, lente 35mm a 1,6m de altura. Ambiente nublado, sombras suaves, pessoas no primeiro plano, interior visível através do vidro, composição cinematográfica.",translation:"Crie um render hiper-realista de uma torre de uso misto. Perspectiva baixa, lente 35mm a 1,6m de altura. Ambiente nublado, sombras suaves, pessoas no primeiro plano, interior visível através do vidro, composição cinematográfica.",description:"Gera render hiper-realista de torre de uso misto com perspectiva a 1,6m do solo, lente 35mm, céu nublado, pessoas no primeiro plano e interior visível pelo vidro.",category:"Exterior",tool:"Geral",tags:["torre","uso misto","render","perspectiva baixa","cinematic","hiper-realista"]},{id:"p026",original:"Create a hyper realistic real estate style photograph. Soft natural light, realistic reflections, furniture shadows, attention to fabric textures. Add a dog to the scene.",translation:"Crie uma fotografia hiper-realista de interior no estilo imobiliário. Luz natural suave, reflexos realistas, sombras do mobiliário, atenção às texturas de tecidos. Adicione um cachorro na cena.",description:"Gera fotografia hiper-realista de interior estilo imobiliário com luz natural, texturas realistas e cachorro na cena. Transmite aconchego e vida ao ambiente.",category:"Interior",tool:"Geral",tags:["interior","fotorrealista","cachorro","luz natural","imobiliário","aconchego"]},{id:"p027",original:"Estilize a imagem de interior vazia com os móveis e decoração da imagem de referência, mantendo exatamente os mesmos elementos, incluindo tapetes, forro, iluminação e texturas das paredes.",translation:"Estilize a imagem de interior vazia com os móveis e decoração da imagem de referência, mantendo exatamente os mesmos elementos, incluindo tapetes, forro, iluminação e texturas das paredes.",description:"Aplica exatamente os móveis e decoração de uma imagem de referência a um ambiente vazio. Use para staging virtual de imóveis sem custos de decoração física.",category:"Interior",tool:"Geral",tags:["staging virtual","decoração","transferência","interior","mobiliário","referência"]},{id:"p028",original:"Crie uma planta arquitetônica com textos, legendas e escala. Renderize com cores, hachuras e sombras.",translation:"Crie uma planta arquitetônica com textos, legendas e escala. Renderize com cores, hachuras e sombras.",description:"Gera planta arquitetônica completa com textos, legendas, escala, cores, hachuras e sombras. Para documentação técnica e apresentações de projetos.",category:"Detalhe",tool:"Geral",tags:["planta arquitetônica","hachuras","legenda","escala","técnico"]},{id:"p029",original:"Crie uma vista axonométrica explodida separando estrutura, lajes e fachada verticalmente. Desenho em wireframe preto e branco.",translation:"Crie uma vista axonométrica explodida separando estrutura, lajes e fachada verticalmente. Desenho em wireframe preto e branco.",description:"Gera axonometria explodida em wireframe P&B separando estrutura, lajes e fachada em camadas verticais. Para apresentações técnicas de sistemas construtivos.",category:"Detalhe",tool:"Geral",tags:["axonometria","explodida","wireframe","estrutura","técnico","lajes"]},{id:"p030",original:"Recrie esta imagem em estilo ilustrativo, incluindo texturas e rótulos.",translation:"Recrie esta imagem em estilo ilustrativo, incluindo texturas e rótulos.",description:"Transforma imagem arquitetônica em estilo ilustrativo editorial com texturas e rótulos anotados. Para materiais de marketing criativo e publicações.",category:"Geral",tool:"Geral",tags:["ilustrativo","editorial","rótulos","anotações"]},{id:"p031",original:"Crie um corte 3D mostrando edifício e terreno com hachuras para diferenciar níveis, incluindo legendas e sombras.",translation:"Crie um corte 3D mostrando edifício e terreno com hachuras para diferenciar níveis, incluindo legendas e sombras.",description:"Gera corte 3D do edifício com terreno usando hachuras para diferenciar os níveis e legendas explicativas. Para documentação técnica de projetos.",category:"Detalhe",tool:"Geral",tags:["corte 3D","hachuras","níveis","legenda","técnico"]},{id:"p032",original:"Corte 3D com linhas técnicas e sombreamento mínimo.",translation:"Corte 3D com linhas técnicas e sombreamento mínimo.",description:"Gera corte 3D minimalista com apenas linhas técnicas e sombreamento discreto. Estética limpa para apresentações modernas de projetos arquitetônicos.",category:"Detalhe",tool:"Geral",tags:["corte 3D","minimalista","técnico","linhas","clean"]},{id:"p033",original:"Create a 3D floor plan with modern aesthetics, adding textures, fabrics, furniture and realistic shadows, without altering the original layout.",translation:"Crie uma planta 3D com estética moderna, adicionando texturas, tecidos, móveis e sombras realistas, sem alterar o layout original.",description:"Transforma planta baixa em planta 3D com móveis, texturas, tecidos e sombras realistas sem alterar o layout. Para apresentações premium de apartamentos e casas.",category:"Interior",tool:"Geral",tags:["planta 3D","mobiliário","texturas","layout","imobiliário"]},{id:"p034",original:"Transforme este esboço arquitetônico em uma fotografia realista sem rótulos.",translation:"Transforme este esboço arquitetônico em uma fotografia realista sem rótulos.",description:"Transforma esboço arquitetônico em fotografia realista limpa, sem rótulos ou marcações. Para transformar croquis em imagens profissionais rapidamente.",category:"Exterior",tool:"Geral",tags:["sketch to render","esboço","fotorrealismo","croqui"]},{id:"p035",original:"Substitua a fachada de vidro de um edifício pelo sistema de revestimento da segunda imagem, mantendo a proporção original.",translation:"Substitua a fachada de vidro de um edifício pelo sistema de revestimento da segunda imagem, mantendo a proporção original.",description:"Substitui o revestimento de fachada de vidro pelo material de uma imagem de referência. Para estudos de fachada e aprovação visual de clientes.",category:"Exterior",tool:"Geral",tags:["fachada","revestimento","substituição","material","vidro"]},{id:"p036",original:"Transforme um modelo 3D em uma visualização arquitetônica profissional.",translation:"Transforme um modelo 3D em uma visualização arquitetônica profissional.",description:"Transforma modelo 3D bruto em visualização arquitetônica profissional com materiais, iluminação e acabamento realistas.",category:"Exterior",tool:"Geral",tags:["modelo 3D","visualização","render","profissional","arquitetura"]},{id:"p037",original:"Transforme a captura de um modelo 3D em fotografia realista usando aço pintado, madeira e alumínio, mantendo o mesmo enquadramento.",translation:"Transforme a captura de um modelo 3D em fotografia realista usando aço pintado, madeira e alumínio, mantendo o mesmo enquadramento.",description:"Transforma captura de modelo 3D em fotografia realista com materiais específicos — aço pintado, madeira e alumínio — mantendo o enquadramento original.",category:"Exterior",tool:"Geral",tags:["screenshot to render","materiais","aço","madeira","fotorrealismo"]},{id:"p038",original:"Altere o estilo de uma imagem para corresponder ao estilo de uma imagem de referência.",translation:"Altere o estilo de uma imagem para corresponder ao estilo de uma imagem de referência.",description:"Transfere o estilo visual de uma imagem de referência para outra imagem. Para padronizar a estética visual de um portfólio ou série de imagens.",category:"Geral",tool:"Geral",tags:["transferência de estilo","estilo","referência"]},{id:"p039",original:"Vista exterior de una casa moderna y lujosa construida con madera natural y piedra, con un auto moderno estacionado en la entrada, luz cálida del atardecer, sombras suaves, reflejos realistas en las ventanas, fotografía arquitectónica tomada con cámara DSLR, alto nivel de detalle.",translation:"Vista exterior de uma casa moderna e luxuosa construída com madeira natural e pedra, com carro moderno estacionado na entrada, luz quente do pôr do sol, sombras suaves, reflexos realistas nas janelas, fotografia arquitetônica com câmera DSLR, alto nível de detalhe.",description:"Gera vista exterior de casa de luxo em madeira natural e pedra com vegetação exuberante, carro moderno e luz quente do pôr do sol. Estética fotográfica DSLR. (Original em espanhol)",category:"Exterior",tool:"Geral",tags:["madeira","pedra","luxo","exterior","pôr do sol","DSLR","residencial"]},{id:"p040",original:"Overlay the architectural masterplan precisely onto the provided aerial photograph of untouched terrain. Render roads, blocks, lots, roundabouts and building footprints as thin clean technical outline linework with soft neon green glow and subtle cyan accents. Add vertical light pillars at key nodes: main entrances, roundabouts, central avenue intersections. Linework fully integrated with terrain, following slopes and natural contours. Strict orthographic top-down view.",translation:"Sobreponha o masterplan arquitetônico com precisão sobre a fotografia aérea do terreno intocado. Renderize vias, quadras, lotes, rotatórias e implantações como linhas técnicas finas com brilho neon verde suave e acentos ciano sutis. Adicione pilares de luz verticais nos nós principais: entradas, rotatórias, cruzamentos. Linhas integradas ao terreno seguindo encostas e contornos naturais. Vista top-down estrita.",description:"Sobreposição precisa do masterplan arquitetônico com linhas neon verde e pilares de luz sobre foto aérea real do terreno. Para apresentações premium de loteamentos.",category:"Aéreo",tool:"Geral",tags:["masterplan","neon verde","top-down","sobreposição","loteamento","urbanismo"]},{id:"p041",original:"Ultra-clean wide 3D architectural visualization showing four perfectly aligned versions of the same two-story residential house side by side. All four from exact same diagonal camera view. Version 01: SketchUp-style massing. Version 02: Structural model. Version 03: Electrical MEP. Version 04: Plumbing MEP. Clean BIM style, white background. Portuguese technical annotations.",translation:"Visualização 3D limpa com quatro versões alinhadas do mesmo edifício residencial de dois andares. Versão 01: modelo de massas SketchUp. Versão 02: modelo estrutural. Versão 03: sistemas elétricos MEP. Versão 04: sistemas hidráulicos MEP. Estilo BIM técnico, fundo branco, anotações técnicas em português.",description:"Gera quatro versões do mesmo edifício num único render: massa, estrutura, instalações elétricas e hidráulicas, com anotações técnicas em português. Para apresentações BIM completas.",category:"Detalhe",tool:"Geral",tags:["BIM","detalhamento","estrutural","hidráulica","elétrica","MEP","técnico"]},{id:"p042",original:"Create a high-end architectural editorial collage mood board. Use only the provided black-and-white technical architectural drawing as base layer — must remain 100% intact. Extract individual elements from the realistic reference image as independent ultra-realistic cut-outs: sofa, armchairs, tables, rugs, pendant light, decorative objects. Rescale and relocate all elements to new positions. Floating editorial layout. Overlay circular material swatches. Neutral beige palette.",translation:"Crie um moodboard collage editorial arquitetônico de alto padrão. Use o desenho técnico arquitetônico em P&B como camada base intacta com todas as linhas e cotas visíveis. Extraia recortes ultra-realistas individuais da imagem realista de referência: sofá, poltronas, mesas, tapetes, luminária, objetos decorativos. Redimensione e reposicione todos os elementos. Layout editorial flutuante. Amostras circulares de materiais. Paleta bege neutra.",description:"Gera moodboard editorial arquitetônico combinando planta técnica em P&B com recortes fotorrealistas de móveis e amostras circulares de materiais. Para apresentações de design de interiores.",category:"Interior",tool:"Geral",tags:["moodboard","editorial","collage","interior","materiais","planta técnica"]},{id:"p043",original:"Insert a three-dimensional white solid text into the scene, physically placed on the ground or attached to the facade, respecting real-world perspective and vanishing points. Text: solid white box structure, clean matte finish, realistic thickness (minimum 20cm), subtle bevel edges. Apply natural daylight reflections. Generate realistic ground contact shadows. Cinematic realism, no floating effect, no glow.",translation:"Insira texto 3D branco sólido na cena, fisicamente posicionado no solo ou fixado à fachada, respeitando perspectiva e pontos de fuga reais. O texto deve parecer estrutura sólida em caixa branca: acabamento fosco limpo, espessura mínima de 20cm, bordas com chanfro sutil. Aplique reflexos de luz natural. Gere sombras de contato realistas. Realismo cinematográfico, sem efeito flutuante.",description:"Gera texto 3D branco sólido integrado fisicamente ao ambiente com perspectiva real e sombras de contato. Para inserir nome ou metragem do empreendimento numa cena.",category:"Texto/Animação",tool:"Geral",tags:["texto 3D","branco","integrado","sombras","fotorrealismo","perspectiva"]},{id:"p044",original:"A wide-angle, high-altitude aerial drone photograph of a luxurious coastal estate at a diagonal oblique angle. Large beachfront property with main villa, multiple blue swimming pools, and two tennis courts. Dense diverse landscaping with succulents, palm trees, green shrubs, sandy paths and natural dunes. To the right, golden sand beach meets clear turquoise ocean with gentle white waves. Perspective pulled back significantly to show scale of terrain and coastline.",translation:"Fotografia aérea de drone em grande angular, de grande altitude, de uma propriedade costeira luxuosa em ângulo oblíquo diagonal. Grande propriedade à beira-mar com villa principal, múltiplas piscinas azuis e duas quadras de tênis. Paisagismo denso com suculentas, palmeiras, arbustos verdes, caminhos de areia e dunas naturais. À direita, praia de areia dourada encontra oceano turquesa claro.",description:"Gera vista aérea de drone oblíqua diagonal de propriedade costeira de luxo mostrando a escala do terreno, piscinas, quadras de tênis e praia. Para apresentações de terrenos premium.",category:"Aéreo",tool:"Geral",tags:["drone","aéreo","oblíquo","propriedade costeira","luxo","piscina","praia"]},{id:"p045",original:"Coloque na imagem em texto caixa 3D em pé, fonte branca, apoiado ao solo no centro do terreno a mentragem: 78.177,00M²",translation:"Coloque na imagem em texto caixa 3D em pé, fonte branca, apoiado ao solo no centro do terreno a mentragem: 78.177,00M²",description:"Insere texto 3D branco em caixa alta apoiado ao solo mostrando a metragem exata do terreno no centro da imagem. Para apresentação de terrenos com tamanho em destaque.",category:"Texto/Animação",tool:"Geral",tags:["texto 3D","metragem","terreno","branco","numeração"]},{id:"p046",original:"Overlay the exact original lot layout over the real terrain, perfectly aligned and undistorted. Add a subtle neon orange glow outline following precisely the lot boundaries, with soft vertical light pillars rising from the perimeter. Futuristic yet realistic architectural visualization, premium real estate style, night blue environment, high contrast.",translation:"Sobreponha o layout exato dos lotes sobre o terreno real, perfeitamente alinhado e sem distorção. Adicione contorno neon laranja suave seguindo os limites dos lotes, com pilares de luz verticais suaves subindo do perímetro. Visualização futurista mas realista, estilo imobiliário premium, ambiente azul noturno, alto contraste.",description:"Gera sobreposição do mapa de loteamento sobre o terreno real com contorno neon laranja e pilares de luz em ambiente noturno azul. Estética futurista premium para apresentações de loteamentos.",category:"Aéreo",tool:"Geral",tags:["loteamento","neon laranja","noturno","futurista","sobreposição","premium"]},{id:"p047",original:"Use the provided image as the exact geometric reference. Reconstruct the same terrain faithfully preserving all proportions, boundaries, coastline shape, vegetation, paths, roads, buildings and topography. Change camera from top-down nadir view to realistic cinematic drone perspective, approximately 45-degree pitch, from a diagonal three-quarter corner angle. Moderate focal length (28-35mm). Output in vertical 9:16.",translation:"Use a imagem fornecida como referência geométrica exata. Reconstrua o mesmo terreno fielmente, preservando todas as proporções, limites, forma da costa, vegetação, caminhos, vias, edifícios e topografia. Mude a câmera de vista top-down estrita para perspectiva de drone cinematográfico de 45 graus, de ângulo diagonal de três quartos. Focal 28-35mm. Formato vertical 9:16.",description:"Transforma vista top-down do terreno em perspectiva de drone a 45° diagonal, formato 9:16, preservando fielmente todas as características do local. Para adaptar imagens de satélite para Reels.",category:"Aéreo",tool:"Geral",tags:["drone 45°","9:16","perspectiva diagonal","terreno","Reels","top-down para oblíquo"]},{id:"p048",original:"\"Isometric 3D architectural white model of [INSIRA A DESCRIÇÃO DA SUA CASA AQUI], minimalist clay render style. The image features a technical solar path diagram with golden yellow arcs showing the sun's trajectory and position at different times of day over the building. A compass rose is visible on the ground. Clean white background, soft studio lighting, high resolution.\"",translation:"\"Modelo 3D arquitetônico branco isométrico de [INSIRA A DESCRIÇÃO DA SUA CASA AQUI], estilo clay render minimalista. A imagem apresenta um diagrama técnico de trajetória solar com arcos dourados mostrando a trajetória e posição do sol em diferentes horários do dia sobre o edifício. Uma rosa dos ventos é visível no solo. Fundo branco limpo, iluminação de estúdio suave.\"",description:"⚠️ SUBSTITUA [INSIRA A DESCRIÇÃO DA SUA CASA AQUI] antes de usar. Gera diagrama de trajetória solar em 3D isométrico estilo clay render branco, com arcos dourados do sol e rosa dos ventos.",category:"Detalhe",tool:"Geral",tags:["mapa solar","trajetória solar","isométrico","clay render","bioclimático","diagrama"]},{id:"p049",original:"Transforme o modelo em uma visualização futurista de planta arquitetônica holográfica. Preserve a estrutura exata, proporções, ângulo da câmera e paisagismo da casa original. Converta toda a arquitetura em wireframe brilhante com contornos de neon branco e laranja, superfícies translúcidas e forte brilho holográfico. Adicione balões de texto flutuantes com imagens realistas do interior de diferentes cômodos (sala, cozinha, quarto, banheiro), com bordas neon laranja-esbranquiçadas e linhas técnicas pontilhadas conectando cada balão à área correspondente. Inclua elementos de UI técnica. Fundo azul escuro noturno, alto contraste, sci-fi cinematográfico.",translation:"Transforme o modelo em uma visualização futurista de planta arquitetônica holográfica. Preserve a estrutura exata, proporções, ângulo da câmera e paisagismo da casa original. Converta toda a arquitetura em wireframe brilhante com contornos de neon branco e laranja, superfícies translúcidas e forte brilho holográfico. Adicione balões de texto flutuantes com imagens realistas do interior de diferentes cômodos. Inclua elementos de UI técnica. Fundo azul escuro noturno, alto contraste, sci-fi cinematográfico.",description:"Transforma a foto da casa num holograma arquitetônico futurista com wireframe neon branco e laranja, balões flutuantes mostrando interiores dos cômodos e UI técnica. Estética sci-fi noturna.",category:"Texto/Animação",tool:"Geral",tags:["holograma","wireframe","neon","futurista","sci-fi","interior","NEOM"]},{id:"p050",original:"Ultra-realistic lifestyle photograph of a woman immersed in a luxury infinity pool at sunset, vertical composition (9:16). Natural human skin rendered with extreme realism. Visible skin pores, subtle natural oil sheen, realistic water refraction on submerged skin areas. The subject is calmly leaning against the pool edge, holding a transparent wine glass with rosé wine. Pool water rendered with physically accurate reflections, refractions, light caustics. Background: modern luxury residence architecture softly out of focus. Golden hour sunset lighting. Full-frame camera, 85-100mm equivalent, shallow depth of field. Medical-grade skin realism. No stylization, no CGI look.",translation:"Fotografia lifestyle ultra-realista de uma mulher imersa em piscina infinita de luxo ao pôr do sol, composição vertical (9:16). Pele humana natural com realismo extremo: poros visíveis, brilho natural sutil, refração realista da água na pele submersa. A modelo apoia-se relaxadamente na borda da piscina segurando uma taça de vinho rosé. Água com reflexos, refrações e cáusticas fisicamente precisas. Ao fundo: arquitetura residencial de luxo desfocada. Luz golden hour, lente 85-100mm.",description:"Gera fotografia lifestyle ultra-realista de mulher em piscina infinita de luxo ao pôr do sol, 9:16, com realismo de pele médico-grau e água fisicamente precisa. Para marketing imobiliário premium.",category:"Exterior",tool:"Geral",tags:["lifestyle","piscina infinita","pôr do sol","luxo","9:16","ultra-realista","golden hour","editorial"]},{id:"p051",original:"{\n\"prompt\": \"Criar uma sobreposição holográfica futurista de estudo topográfico sobre este terreno em aclive localizado em esquina pavimentada. Aplicar mapa planialtimétrico completo com curvas de nível detalhadas seguindo fielmente a inclinação natural do morro, cotas altimétricas numéricas distribuídas pelo terreno, linhas mestras de declividade, marcação de pontos notáveis (vértice, talvegue, crista), indicação de norte magnético, grade cartográfica sutil e demarcação do perímetro do lote. Inserir mapa de calor topográfico com transição suave do azul (cotas baixas) ao vermelho (cotas mais altas). Estilo holograma arquitetônico luminoso, linhas finas neon ciano e âmbar, glow suave. Cinematic drone view.\"\n}",translation:"Topográfico holográfico técnico V1 — Nano Banana. Copiar o JSON completo.",description:"Gera sobreposição holográfica de estudo topográfico sobre terreno em aclive: curvas de nível, cotas, mapa de calor azul ao vermelho, norte magnético e perímetro do lote. Linhas neon ciano e âmbar. Para Nano Banana.",category:"Aéreo",tool:"Nano Banana",tags:["topografia","holograma","curvas de nível","mapa de calor","aclive","Nano Banana","neon","ciano"]},{id:"p052",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"cinematic futuristic real estate\",\n\"prompt\": \"Sobreposição holográfica conceitual de estudo topográfico em terreno em aclive localizado em esquina pavimentada. Visual mais artístico e impactante do que técnico. Curvas de nível estilizadas e fluidas, perímetro do lote destacado com linha neon pulsante, mapa de calor integrado ao terreno com transição azul para vermelho indicando potencial construtivo e valorização. Inserir pontos estratégicos brilhantes indicando melhor platô para implantação de residência premium. Holograma em tons ciano e âmbar com glow intenso. Atmosfera de fim de tarde com luz dourada cinematográfica.\",\n\"lighting\": \"golden hour cinematic\",\n\"effects\": \"soft glow, volumetric light, light particles, subtle vignette\",\n\"contrast\": \"high contrast to emphasize hologram\",\n\"detail_level\": \"medium artistic\",\n\"aspect_ratio\": \"9:16\"\n}",translation:"Topográfico holográfico artístico V2 — Nano Banana. Copiar o JSON completo.",description:"Versão artística do topográfico holográfico: curvas estilizadas, neon pulsante no perímetro, pontos do platô ideal e mapa de calor de valorização. Visual impactante para Reels imobiliário. Nano Banana.",category:"Aéreo",tool:"Nano Banana",tags:["topografia artística","holograma","neon pulsante","platô ideal","Reels","Nano Banana","9:16","valorização"]},{id:"p053",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"architectural hologram wireframe\",\n\"prompt\": \"Criar apenas o holograma arquitetônico da casa moderna em estilo wireframe técnico, sem construção sólida e sem volumetria real renderizada. A casa deve ser formada exclusivamente por linhas luminosas brancas e azul-ciano, estilo malha 3D wireframe, com transparência total. Incluir linhas de cota arquitetônica, marcações dimensionais, indicação de rooftop terrace, corte técnico seção A-A e planta baixa em miniatura ao lado. A casa deve parecer uma projeção holográfica flutuando levemente acima do terreno.\",\n\"negative_prompt\": \"no solid house, no real materials, no concrete, no glass reflections, no textured surfaces\",\n\"lighting\": \"low ambient light to enhance hologram glow\",\n\"effects\": \"soft glow lines, particle sparks subtle, light bloom\",\n\"contrast\": \"high contrast for wireframe visibility\",\n\"detail_level\": \"high technical precision\"\n}",translation:"Casa holograma V1 técnico — Nano Banana. Copiar o JSON completo.",description:"Gera casa holograma V1 em wireframe técnico puro: linhas brancas e azul-ciano flutuando sobre o terreno, com cotas arquitetônicas, corte A-A e planta baixa em miniatura. Alta precisão técnica. Nano Banana.",category:"Texto/Animação",tool:"Nano Banana",tags:["casa holograma","wireframe","técnico","blueprint","ciano","Nano Banana","V1","cotas"]},{id:"p054",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"cinematic futuristic real estate hologram\",\n\"prompt\": \"Criar um holograma arquitetônico conceitual e impactante de uma casa moderna de alto padrão, formado exclusivamente por linhas neon luminosas em ciano e âmbar, estilo wireframe 3D artístico. A casa deve ser 100% holográfica. Apenas linhas brilhantes desenhando volumes, lajes, varanda, rooftop terrace e garagem. Incluir pequenos marcadores luminosos indicando áreas estratégicas. Dusk cinematográfico, alto contraste. Visual exclusivo e elegante para Reels imobiliário.\",\n\"negative_prompt\": \"no solid house, no realistic rendered building, no real materials, no textured surfaces\",\n\"lighting\": \"cinematic dusk with low ambient light\",\n\"effects\": \"intense glow lines, subtle light particles, soft bloom, cinematic depth of field\",\n\"contrast\": \"high contrast to emphasize neon hologram\",\n\"detail_level\": \"medium artistic\",\n\"aspect_ratio\": \"9:16\"\n}",translation:"Casa holograma V2 neon artístico — Nano Banana. Copiar o JSON completo.",description:"Gera casa holograma V2 em neon artístico ciano e âmbar: wireframe 3D impactante sem volumetria sólida, com marcadores de áreas estratégicas e partículas de luz. Para Reels imobiliário. Nano Banana.",category:"Texto/Animação",tool:"Nano Banana",tags:["casa holograma","neon artístico","ciano","âmbar","Reels","Nano Banana","V2","wireframe"]},{id:"p055",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"ultra luxury futuristic architectural hologram\",\n\"prompt\": \"Criar um holograma arquitetônico premium de uma residência moderna de alto padrão, formado exclusivamente por linhas wireframe luminosas em branco frio e azul-ciano. A casa deve ser 100% holográfica. Linhas arquitetônicas finas e precisas definindo pavimentos, lajes, esquadrias, rooftop terrace e garagem. Inserir pequenos painéis flutuantes translúcidos ao redor com informações como 'TOTAL AREA 480 m²' e '3 STORIES', além de corte técnico e planta baixa em wireframe. Fundo escurecido, iluminação baixa, glow elegante. Estética Apple Vision Pro.\",\n\"negative_prompt\": \"no solid house, no realistic textures, no concrete, no wood, no glass reflections\",\n\"lighting\": \"low ambient cinematic dusk lighting\",\n\"effects\": \"clean soft glow, subtle bloom, volumetric light, floating UI panels\",\n\"contrast\": \"high contrast to enhance hologram visibility\",\n\"detail_level\": \"high precision\",\n\"aspect_ratio\": \"9:16\"\n}",translation:"Casa holograma V4 Black ultra luxury — Nano Banana. Copiar o JSON completo.",description:"Gera casa holograma V4 Black ultra luxury: wireframe branco frio e ciano com painéis UI flutuantes (área total, andares), planta e corte técnico. Estética Apple Vision Pro. Nano Banana.",category:"Texto/Animação",tool:"Nano Banana",tags:["casa holograma","ultra luxury","branco frio","ciano","UI flutuante","Apple Vision Pro","Nano Banana","V4"]}];
