<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#191919;--border:#222;--border2:#2a2a2a;
  --text:#e8e8e8;--text2:#888;--text3:#555;--accent:#e8ff47;--danger:#ff4757;
  --ext-bg:#0f2a1a;--ext:#4dff91;
  --int-bg:#0d1f35;--int:#5ba8ff;
  --aer-bg:#1a1035;--aer:#a78bff;
  --mov-bg:#2a1800;--mov:#ffaa44;
  --det-bg:#2a0d1a;--det:#ff6b9d;
  --ani-bg:#2a1205;--ani:#ff7b45;
  --ger-bg:#1a1a1a;--ger:#888;
  --nan-bg:#1a1000;--nan:#ffcc00;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,textarea,select,button{font-family:'Syne',sans-serif;font-size:13px;outline:none;border:none;background:none;color:var(--text)}
input,textarea,select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;width:100%;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
button{cursor:pointer;border-radius:6px;padding:7px 14px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700}
button.primary:hover:not(:disabled){background:#b8cc30;border-color:#b8cc30;color:#0a0a0a}
textarea{resize:vertical;min-height:100px}
::placeholder{color:var(--text3)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
pre{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;white-space:pre-wrap;word-break:break-word;line-height:1.6;color:var(--text2)}
.label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:block;margin-bottom:5px}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.tag{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:99px;border:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s}
.card.open{border-color:var(--border2)}
.section-block{margin-bottom:14px}
.section-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px}
.sticky-header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:20px 0 16px}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;min-width:28px}
.filter-btn{font-size:10px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.filter-btn.active{font-weight:700}
.empty{text-align:center;padding:60px 0;color:var(--text3)}
.add-panel{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:20px;margin-top:20px}
.stats{display:flex;gap:12px;margin-top:4px}
.stat{font-size:11px;color:var(--text3)}
.stat span{color:var(--accent);font-weight:700}
.actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.info-row{margin-bottom:12px}
.info-row p{font-size:13px;color:var(--text2);line-height:1.6;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'prompt-library-imob-v2';

const PROMPTS_INICIAIS = [
  {id:"p001",original:"A câmera começa a partir de uma perspectiva alta e estável de drone, mostrando o terreno sendo limpo por uma motoniveladora. A câmera realiza um zoom lento, contínuo e realista em direção ao trabalhador que está operando a máquina. O zoom é óptico e fisicamente preciso.",translation:"A câmera começa a partir de uma perspectiva alta e estável de drone, mostrando o terreno sendo limpo por uma motoniveladora. A câmera realiza um zoom lento, contínuo e realista em direção ao trabalhador que está operando a máquina. O zoom é óptico e fisicamente preciso.",description:"Zoom cinematográfico de drone descendo progressivamente até o close no operador da motoniveladora. Ideal para apresentar início de obras de terraplanagem.",category:"Movimento",tool:"Kling",tags:["drone","operário","motoniveladora","terraplanagem","zoom"]},
  {id:"p002",original:"Crie um vídeo em timelapse acelerado dos operarios trabalhando na construção dessa casa. A imagem precisa ter o mesmo angulo, a camera fixa em um tripe, sem movimento e sem zoom",translation:"Crie um vídeo em timelapse acelerado dos operarios trabalhando na construção dessa casa. A imagem precisa ter o mesmo angulo, a camera fixa em um tripe, sem movimento e sem zoom",description:"Time-lapse de câmera fixa mostrando operários construindo uma casa. Câmera sem movimento nem zoom.",category:"Movimento",tool:"Kling",tags:["timelapse","construção","câmera fixa","obra","operários"]},
  {id:"p003",original:"Start with a completely static, true top-down (nadir) aerial view of pristine, untouched forest terrain. The camera is fully locked: no pan, no tilt, no zoom, no rotation. From the exact center of the frame, ultra-thin, clean, controlled neon linework begins to draw itself precisely over the land surface. First roads, then streets, urban blocks, lot subdivisions and building footprints. Neon color: soft green for preservation areas, pure white for buildings/streets/lots. Glow: clean, low-intensity, sharp edges, no bloom. Terrain fully visible at all times. Final frame: complete masterplan projected over real terrain, precise and cinematic.",translation:"Comece com uma vista aérea top-down totalmente estática de terreno florestal intocado. Câmera completamente travada. Do centro exato do quadro, linhas neon ultra-finas começam a se desenhar sobre o terreno com precisão. Primeiro as vias principais, depois ruas, quadras, subdivisões e implantações. Verde neon para áreas verdes, branco puro para vias e edificações. Brilho limpo de baixa intensidade. O terreno permanece completamente visível.",description:"Câmera top-down estática com linhas neon se desenhando progressivamente revelando o masterplan sobre o terreno real. Prompt principal para apresentação de loteamentos no Kling.",category:"Texto/Animação",tool:"Kling",tags:["masterplan","neon","top-down","loteamento","linhas","terreno"]},
  {id:"p004",original:"A single continuous cinematic shot starting with a wide view and ending in a close-up. Wide shot of a large earthmoving site, tractor operating slowly forward. Natural daylight, realistic colors, subtle dust, documentary realism. Camera starts far and wide, performs smooth steady forward push toward the tractor, descending gradually. Transitions from wide to medium shot without any cut. Near the end, camera reaches the tractor cabin, moving seamlessly into a close-up of the driver's face and hands on the controls. Focused expression, natural skin tones, realistic work clothing. Soft reflections on cabin glass, floating dust particles. Shallow depth of field. Ultra-realistic, cinematic, no cuts, no text, no logos.",translation:"Plano-sequência cinematográfico único do plano geral ao close-up. Plano geral amplo de um grande canteiro de terraplanagem, trator se movendo lentamente. Luz natural do dia, realismo documental, poeira sutil. A câmera começa ampla e avança suavemente em direção ao trator descendo gradualmente. No final, a câmera alcança a cabine do trator e entra em close-up no rosto e nas mãos do motorista. Expressão concentrada, tons de pele naturais. Reflexos suaves no vidro, partículas de poeira. Profundidade de campo rasa.",description:"Plano-sequência do plano geral até close no rosto do tratorista na cabine. Ideal para vídeos documentais de obras de terraplanagem com narrativa humana.",category:"Movimento",tool:"Kling",tags:["trator","terraplanagem","plano-sequência","close-up","obra","documental"]},
  {id:"p005",original:"A single continuous cinematic shot from aerial to close-up. Opens with high-altitude aerial view of construction site. Camera descends smoothly, tilts forward, reveals plumbing trenches and exposed piping. Flows into medium shot of plumber working on pipes, kneeling, adjusting plumbing components. Realistic tools, pipes, fittings. Natural workwear, gloves, safety details. Final push-in to close-up of plumber's hands and face. Focused expression, detailed hand movement, realistic textures. Shallow depth of field. Soft sunlight highlights dust and surface details. Ultra-realistic, cinematic, no cuts.",translation:"Plano-sequência único do aéreo até o close-up. Abre com vista aérea a grande altitude de canteiro de obras. A câmera desce suavemente e se inclina, revelando trincheiras de encanamento e tubulações expostas. Transita para plano médio do encanador trabalhando nas tubulações. Ferramentas realistas, tubos e conexões visíveis. Final com close-up nas mãos e no rosto do encanador. Profundidade de campo rasa. Luz solar suave.",description:"Plano-sequência de drone descendo do aéreo até close-up no encanador trabalhando nas instalações hidráulicas da obra.",category:"Movimento",tool:"Kling",tags:["encanador","hidráulica","plano-sequência","obra","infraestrutura","close-up"]},
  {id:"p006",original:"A single continuous cinematic shot from aerial view to final architectural reveal. Opens with high-altitude aerial view of residential development. Camera descends smoothly, tilts forward, reveals landscape and house. Surroundings transition to completed residential environment with grass, pathways and landscaping. Final: slow elegant push-in toward the front facade. Materials, textures, windows, entrance door and facade geometry clearly defined. Soft cinematic lighting, clean premium residential aesthetic. Ultra-realistic, no cuts, no text.",translation:"Plano-sequência único do aéreo até o reveal final da fachada da casa. Abre com vista aérea de empreendimento residencial. A câmera desce suavemente, inclina-se para frente, revela a paisagem e a casa. O entorno transita para um ambiente residencial concluído com grama, caminhos e paisagismo. Plano final: avanço lento e elegante em direção à fachada frontal. Iluminação cinematográfica suave, estética residencial premium.",description:"Plano-sequência de drone do aéreo até o reveal elegante da fachada completa da casa. Perfeito para apresentações de residências de alto padrão.",category:"Aéreo",tool:"Kling",tags:["reveal","fachada","plano-sequência","drone","residencial","aéreo"]},
  {id:"p007",original:"Static camera, wide and well-balanced composition. Camera fully locked: no pan, tilt, zoom or rotation. Abstract mood board elements related to interior design orbit gracefully within the space in smooth controlled trajectories. One by one they slow down and snap into perfect alignment, settling into their final physical positions. Materials, furniture, textures and decorative elements progressively resolve into a cohesive realistic environment. Transformation is calm, elegant, intentional. Final state: complete serene high-end living room interior with refined lighting, realistic materials, balanced composition.",translation:"Câmera estática, composição ampla e equilibrada. Câmera completamente travada, sem qualquer movimento. Elementos abstratos de moodboard de design de interiores orbitam graciosamente pelo espaço em trajetórias suaves. Um a um, os elementos desaceleram e se encaixam perfeitamente em suas posições físicas finais. A transformação é calma, elegante e intencional. Estado final: sala de estar completa e serena de alto padrão.",description:"Câmera estática enquanto elementos de moodboard orbitam e se encaixam progressivamente montando uma sala de estar de luxo. Ideal para apresentações de interiores premium.",category:"Interior",tool:"Kling",tags:["moodboard","interior","sala de estar","câmera estática","transição","mobiliário"]},
  {id:"p008",original:"A single continuous cinematic shot from aerial view to final lifestyle action. Opens with high-altitude aerial view of developed residential area. Camera descends and tilts forward. A modern tennis court emerges naturally within the landscape. Camera glides closer, transitioning from wide view to medium shot. A woman is playing tennis, movements fluid and athletic. Final: smooth elegant push-in toward the player as she prepares to hit the ball. Dynamic cinematic composition, shallow depth of field. Soft sunlight. Ultra-realistic, cinematic, no cuts.",translation:"Plano-sequência único do aéreo até a ação de lifestyle final. Abre com vista aérea de área residencial desenvolvida. A câmera desce e se inclina, revelando uma quadra de tênis moderna no paisagismo. Uma mulher joga tênis com movimentos fluidos e atléticos. Plano final: avanço elegante em direção à jogadora se preparando para rebater a bola.",description:"Plano-sequência do aéreo até close na jogadora de tênis do condomínio. Ideal para apresentar amenidades esportivas e lifestyle de alto padrão.",category:"Aéreo",tool:"Kling",tags:["quadra de tênis","lifestyle","plano-sequência","amenidades","condomínio","esporte"]},
  {id:"p009",original:"A vast barren terrain at sunrise, dry cracked ground with subtle fog drifting. Cinematic wide shot, low camera angle slowly moving forward. Suddenly, a massive metallic 3D text object drops from the sky at extreme speed. The impact is aggressive and powerful, creating a shockwave, debris, and a large dust explosion. Camera shakes slightly on impact. 3D text is heavy, bold, reflective metal with sharp edges, partially embedding into the ground. Dust particles, rocks and fragments fly in slow motion. Dramatic lighting, high contrast, volumetric dust, ultra realistic textures, motion blur, depth of field, cinematic, 4K, epic atmosphere.",translation:"Terreno árido ao amanhecer, solo rachado seco com névoa sutil. Plano geral cinematográfico, ângulo baixo avançando lentamente. De repente, um enorme texto 3D metálico cai do céu em velocidade extrema. O impacto é agressivo e poderoso, criando uma onda de choque, destroços e grande explosão de poeira. O texto 3D é pesado, metal reflexivo com bordas afiadas, parcialmente embutido no solo. Poeira, pedras e fragmentos em câmera lenta. Iluminação dramática, alto contraste, 4K.",description:"Texto 3D metálico gigante caindo do céu e impactando o terreno com efeito explosivo épico. Para revelar nome ou slogan de empreendimentos com alto impacto visual.",category:"Texto/Animação",tool:"Kling",tags:["texto 3D","impacto","explosão","dramático","reveal","metálico","épico"]},
  {id:"p010",original:"Camera executes smooth controlled rightward arc maintaining constant speed and stabilization. Building's physical materials gradually dissolve into precise wireframes and exposed structural layers, revealing architectural logic without abrupt transitions. Four technical architectural models disengage from the façade one after another, rotating outward with subtle mechanical precision. As camera completes its arc, the four models settle into a clean vertical stack, perfectly spaced and aligned, forming a clear readable architectural sequence. Motion remains fluid, grounded in realistic physics.",translation:"A câmera executa um arco suave e controlado para a direita. Os materiais físicos do edifício se dissolvem gradualmente em wireframes precisos e camadas estruturais expostas, revelando a lógica arquitetônica sem transições abruptas. Quatro modelos técnicos se destacam da fachada um a um, rotacionando para fora com precisão mecânica sutil. Conforme a câmera completa seu arco, os quatro modelos se organizam em pilha vertical limpa, perfeitamente espaçada.",description:"Câmera em arco revela camadas estruturais em wireframe com 4 modelos técnicos se destacando da fachada em sequência. Para apresentações técnicas e detalhamento arquitetônico.",category:"Detalhe",tool:"Kling",tags:["wireframe","estrutural","BIM","detalhamento","arco de câmera","técnico"]},
  {id:"p011",original:"Movimento de câmera avançando lentamente em direção à janela, revelando o interior, com movimento cinematográfico suave.",translation:"Movimento de câmera avançando lentamente em direção à janela, revelando o interior, com movimento cinematográfico suave.",description:"Câmera avança suavemente em direção a uma janela revelando o interior do imóvel. Simples e eficaz para apresentações de casas e apartamentos.",category:"Interior",tool:"Kling",tags:["janela","interior","reveal","câmera","residencial"]},
  {id:"p012",original:"Ultra-realistic aerial composite render placing the residential housing complex from reference @img2 onto the corner lot terrain from reference @img1, fully occupying the entire area of darker soil. Match camera angle to high oblique drone perspective. Adapt scale and orientation to align with streets and sidewalks. Apply realistic ground integration, compacted soil, elevation transitions, curb alignment and accurate setbacks. Late-afternoon daylight, physically correct shadows, soft ambient occlusion, realistic roof reflections. Photorealistic architectural visualization, cinematic realism.",translation:"Composição aérea ultra-realista inserindo o complexo residencial da referência @img2 no terreno de esquina da referência @img1. Ângulo de câmera oblíquo alto de drone. Adapte escala e orientação para alinhar com ruas e calçadas. Integração realista ao solo com compactação, transições de nível, alinhamento de meio-fio e recuos precisos. Luz do fim da tarde, sombras fisicamente corretas, oclusão ambiental suave.",description:"Composição aérea que insere o projeto render no terreno real a partir de duas imagens de referência. Ideal para mostrar o empreendimento implantado no lote real com máximo realismo.",category:"Aéreo",tool:"Geral",tags:["composição aérea","implantação","render no terreno","drone","fotorrealismo"]},
  {id:"p013",original:"1 - Limpeza e preparo do lote\n2 - Escavações para fundação\n3 - Execução das fundações (sapatas, estacas, blocos ou radier)\n4 - Baldrame / vigas de fundação\n5 - Aterro interno e compactação\n6 - Execução dos pilares\n7 - Execução das vigas\n8 - Execução das lajes\n9 - Levantamento da alvenaria\n10 - Instalações hidráulicas e elétricas embutidas\n11 - Execução da cobertura\n12 - Chapisco, emboço e reboco\n13 - Instalação dos vidros\n14 - Pintura final e limpeza da obra\n15 - Casa pronta com a família chegando feliz",translation:"Sequência de 15 frames mostrando todas as etapas construtivas, do lote vazio à família chegando.",description:"Sequência de 15 imagens mostrando todas as etapas construtivas da casa, do lote vazio à família chegando. Excelente para posts de acompanhamento de obra no Instagram.",category:"Exterior",tool:"Geral",tags:["evolução da obra","etapas","construção","sequência","família","15 fases"]},
  {id:"p014",original:"Sketch to Render: Create a highly realistic exterior architectural visualization based on the provided sketch. Rough cast-in-place concrete pathway in foreground with natural imperfections, dry leaves scattered. Right side: dense tropical landscaping, layered bushes, broad-leaf plants, weed grass. Left side: calm water body with tiled pool finish, floating water plants, koi fish, gentle ripples. Main structure: polished concrete with tonal variations and warm accent lighting. Distance: sandy beach aligned with building axis. Tall tropical trees (palms, coastal vegetation). Bright sunny day, strong natural daylight, sparse wispy clouds. Birds flying. Cinematic wide-angle composition.",translation:"Crie uma visualização arquitetônica externa altamente realista com base no esboço fornecido. Caminho de concreto no primeiro plano com imperfeições naturais e folhas secas. Lado direito: paisagismo tropical denso. Lado esquerdo: piscina com plantas aquáticas flutuantes e peixes koi. Estrutura principal em concreto polido com variações tonais e iluminação quente. Ao fundo, praia de areia alinhada com o eixo do edifício. Palmeiras e vegetação costeira. Dia ensolarado, luz intensa.",description:"Transforma esboço arquitetônico em render exterior realista de residência de luxo com piscina de koi, concreto polido e praia tropical ao fundo.",category:"Exterior",tool:"Geral",tags:["sketch to render","tropical","concreto polido","piscina koi","praia","luxo"]},
  {id:"p015",original:"Screenshot to Render: Turn the provided screenshot into an ultra-realistic luxury real estate photography-style rendering with cinematic color grading. Villa in Italy, authentic Mediterranean context. Architecture finished in polished beige limestone, detailed mouldings, warm soffit lighting. Slim modern window frames with realistic glass reflections, refined metal entrance gate in dark steel or bronze. Shiny luxury cars positioned naturally. Foreground road: realistic asphalt with scratches, cracks, bumps. Italian landscape: olive trees, cypress, manicured shrubs, warm earthy terrain. Soft natural daylight, cinematic camera angle, professional real estate composition.",translation:"Transforme o screenshot fornecido em um render hiper-realista no estilo de fotografia imobiliária de luxo, com color grading cinematográfico. Villa na Itália, contexto mediterrâneo autêntico. Arquitetura em calcário bege polido, molduras detalhadas, iluminação quente embutida sob os beirais. Carros de luxo posicionados naturalmente. Via com asfalto realista. Paisagem italiana: oliveiras, ciprestes, arbustos podados. Luz natural suave, ângulo cinematográfico.",description:"Transforma screenshot de modelo 3D em render fotorrealista de villa italiana de luxo com contexto mediterrâneo, carros de luxo e color grading cinematográfico.",category:"Exterior",tool:"Geral",tags:["screenshot to render","villa italiana","luxo","mediterrâneo","fotorrealismo","color grading"]},
  {id:"p016",original:"Transforme a casa da imagem em uma planta em projeção neon, mantendo a construção como é",translation:"Transforme a casa da imagem em uma planta em projeção neon, mantendo a construção como é",description:"Transforma a foto da casa em planta neon mantendo as proporções originais. Efeito moderno e futurista para apresentações de empreendimentos.",category:"Texto/Animação",tool:"Geral",tags:["neon","planta","futurista","projeção","casa"]},
  {id:"p017",original:"transforma essa casa em maquete 3D colocada em uma mesa grande exposta num estande de vendas imobiliário, com pessoas olhando ao redor",translation:"transforma essa casa em maquete 3D colocada em uma mesa grande exposta num estande de vendas imobiliário, com pessoas olhando ao redor",description:"Transforma foto da casa em maquete 3D sobre mesa em estande de vendas imobiliário com visitantes ao redor. Ótimo para materiais de lançamento.",category:"Geral",tool:"Geral",tags:["maquete 3D","estande de vendas","lançamento","apresentação"]},
  {id:"p018",original:"Create a sequence of illustrative timeline diagrams showing the evolution of an urban area. Show the diagrams in top 2D plan view with colors in urban drawings style. Clearly state the years on each diagram along with a short brief of the major event. Show north point in the diagrams.",translation:"Crie uma sequência de diagramas ilustrativos em formato de linha do tempo mostrando a evolução de uma área urbana. Apresente em vista superior 2D com cores no estilo de desenho urbano. Indique claramente os anos em cada diagrama com breve resumo do evento principal. Mostre o norte nos diagramas.",description:"Gera sequência de diagramas de linha do tempo em vista 2D mostrando a evolução histórica de uma área urbana. Para apresentações de projetos urbanísticos.",category:"Geral",tool:"Geral",tags:["timeline","urbanismo","diagrama","evolução urbana","2D","masterplan"]},
  {id:"p019",original:"Create a 3D site analysis diagram from this aerial image. Use circular isometric base, north orientation to upper right corner. Desaturated map, buildings in soft gray tones, vegetation in pastel green, water in light blue. Include N,S,E,W directions, wind direction with wavy blue arrows and solar path with semi-transparent orange lines. Everything outside the circle must be white. Add soft shadows.",translation:"Crie um diagrama de análise de terreno em 3D a partir desta imagem aérea. Use base circular isométrica, norte para o canto superior direito. Mapa dessaturado, edifícios em cinza suave, vegetação em verde pastel, água em azul claro. Inclua direções N,S,L,O, vento com setas azuis onduladas e trajetória solar com linhas laranja semitransparentes. Tudo fora do círculo em branco. Sombras suaves.",description:"Diagrama de análise de terreno em 3D isométrico circular, com orientação solar, ventilação e mapa dessaturado. Para apresentações técnicas de projetos urbanísticos.",category:"Aéreo",tool:"Geral",tags:["análise de terreno","diagrama 3D","isométrico","urbanismo","solar","ventilação"]},
  {id:"p020",original:"Create a 2D floor plan based on the diagram provided. Use proper line weights for a professional drawing. Add furniture and draw at the correct scale. Remove all texts.",translation:"Crie uma planta baixa 2D baseada no diagrama fornecido. Use espessuras de linha adequadas para um desenho profissional. Adicione mobiliário e desenhe na escala correta. Remova todos os textos.",description:"Transforma diagrama simples em planta baixa 2D profissional com mobiliário, espessuras de linha corretas e sem textos.",category:"Detalhe",tool:"Geral",tags:["planta baixa","2D","mobiliário","profissional","arquitetura"]},
  {id:"p021",original:"Turn this Google Earth screenshot into a SketchUp 3D model style image. White buildings with black outlines, no colors or textures, with projected shadows. Vegetation in semi-transparent sage green with black outlines.",translation:"Transforme esta captura do Google Earth em imagem no estilo de modelo 3D do SketchUp. Edifícios brancos com contornos pretos, sem cores ou texturas, com sombras projetadas. Vegetação em verde sálvia semitransparente com contornos pretos.",description:"Transforma screenshot do Google Earth em imagem estilo SketchUp 3D com edifícios brancos, contornos pretos e vegetação verde sálvia. Para análises urbanas e apresentações de contexto.",category:"Aéreo",tool:"Geral",tags:["SketchUp","Google Earth","modelo 3D","urbano","análise de contexto"]},
  {id:"p022",original:"Crie 4 diagramas circulares em estilo vetorial urbano: Edifícios em preto, Vegetação em verde, Ruas em azul, Quadras em tons de rosa. Organizados em uma única imagem, fundo branco, com sombras suaves.",translation:"Crie 4 diagramas circulares em estilo vetorial urbano: Edifícios em preto, Vegetação em verde, Ruas em azul, Quadras em tons de rosa. Organizados em uma única imagem, fundo branco, com sombras suaves.",description:"Gera 4 diagramas circulares de análise urbana em estilo vetorial com código de cores por elemento. Para apresentações de masterplans e projetos urbanos.",category:"Geral",tool:"Geral",tags:["diagrama urbano","circular","vetorial","análise urbana","masterplan"]},
  {id:"p023",original:"Create a step-by-step form evolution diagram of a mixed-use terraced complex, in BIG Architects style, in four panels on white background, with soft shadows.",translation:"Crie um diagrama de evolução volumétrica passo a passo de um complexo de uso misto em terraços, no estilo BIG Architects, em quatro painéis sobre fundo branco, com sombras suaves.",description:"Diagrama de evolução volumétrica em 4 passos no estilo BIG Architects, mostrando a transformação progressiva da forma arquitetônica.",category:"Geral",tool:"Geral",tags:["evolução volumétrica","BIG Architects","diagrama","conceito","forma"]},
  {id:"p024",original:"Create a realistic aerial view of this location from Google Maps. Remove texts and labels. Show buildings in 3D with correct heights.",translation:"Crie uma vista aérea realista deste local a partir do Google Maps. Remova textos e ícones. Mostre os edifícios em 3D com alturas corretas.",description:"Transforma imagem do Google Maps em vista aérea realista com edifícios em 3D e sem textos. Para contextualizar localização de empreendimentos.",category:"Aéreo",tool:"Geral",tags:["Google Maps","vista aérea","3D","localização","contexto urbano"]},
  {id:"p025",original:"Crie um render hiper-realista de uma torre de uso misto. Perspectiva baixa, lente 35mm a 1,6m de altura. Ambiente nublado, sombras suaves, pessoas no primeiro plano, interior visível através do vidro, composição cinematográfica.",translation:"Crie um render hiper-realista de uma torre de uso misto. Perspectiva baixa, lente 35mm a 1,6m de altura. Ambiente nublado, sombras suaves, pessoas no primeiro plano, interior visível através do vidro, composição cinematográfica.",description:"Render hiper-realista de torre de uso misto com perspectiva a 1,6m do solo, lente 35mm, céu nublado e pessoas no primeiro plano.",category:"Exterior",tool:"Geral",tags:["torre","uso misto","render","perspectiva baixa","cinematic","hiper-realista"]},
  {id:"p026",original:"Create a hyper realistic real estate style photograph. Soft natural light, realistic reflections, furniture shadows, attention to fabric textures. Add a dog to the scene.",translation:"Crie uma fotografia hiper-realista de interior no estilo imobiliário. Luz natural suave, reflexos realistas, sombras do mobiliário, atenção às texturas de tecidos. Adicione um cachorro na cena.",description:"Fotografia hiper-realista de interior estilo imobiliário com luz natural, móveis com sombras e texturas realistas e cachorro na cena. Transmite aconchego e vida.",category:"Interior",tool:"Geral",tags:["interior","fotorrealista","cachorro","luz natural","imobiliário","aconchego"]},
  {id:"p027",original:"Estilize a imagem de interior vazia com os móveis e decoração da imagem de referência, mantendo exatamente os mesmos elementos, incluindo tapetes, forro, iluminação e texturas das paredes.",translation:"Estilize a imagem de interior vazia com os móveis e decoração da imagem de referência, mantendo exatamente os mesmos elementos, incluindo tapetes, forro, iluminação e texturas das paredes.",description:"Aplica exatamente os móveis e decoração de uma imagem de referência a um ambiente vazio. Para staging virtual de imóveis.",category:"Interior",tool:"Geral",tags:["staging virtual","decoração","transferência","interior","mobiliário","referência"]},
  {id:"p028",original:"Crie uma planta arquitetônica com textos, legendas e escala. Renderize com cores, hachuras e sombras.",translation:"Crie uma planta arquitetônica com textos, legendas e escala. Renderize com cores, hachuras e sombras.",description:"Gera planta arquitetônica completa com textos, legendas, escala, cores, hachuras e sombras. Para documentação técnica e apresentações de projetos.",category:"Detalhe",tool:"Geral",tags:["planta arquitetônica","hachuras","legenda","escala","técnico"]},
  {id:"p029",original:"Crie uma vista axonométrica explodida separando estrutura, lajes e fachada verticalmente. Desenho em wireframe preto e branco.",translation:"Crie uma vista axonométrica explodida separando estrutura, lajes e fachada verticalmente. Desenho em wireframe preto e branco.",description:"Axonometria explodida em wireframe P&B separando estrutura, lajes e fachada em camadas verticais. Para apresentações técnicas de sistemas construtivos.",category:"Detalhe",tool:"Geral",tags:["axonometria","explodida","wireframe","estrutura","técnico","lajes"]},
  {id:"p030",original:"Recrie esta imagem em estilo ilustrativo, incluindo texturas e rótulos.",translation:"Recrie esta imagem em estilo ilustrativo, incluindo texturas e rótulos.",description:"Transforma imagem arquitetônica em estilo ilustrativo com texturas e rótulos anotados. Para materiais de marketing criativo e apresentações editoriais.",category:"Geral",tool:"Geral",tags:["ilustrativo","editorial","rótulos","anotações"]},
  {id:"p031",original:"Crie um corte 3D mostrando edifício e terreno com hachuras para diferenciar níveis, incluindo legendas e sombras.",translation:"Crie um corte 3D mostrando edifício e terreno com hachuras para diferenciar níveis, incluindo legendas e sombras.",description:"Corte 3D do edifício com terreno usando hachuras para diferenciar os níveis e legendas explicativas. Para documentação técnica.",category:"Detalhe",tool:"Geral",tags:["corte 3D","hachuras","níveis","legenda","técnico"]},
  {id:"p032",original:"Corte 3D com linhas técnicas e sombreamento mínimo.",translation:"Corte 3D com linhas técnicas e sombreamento mínimo.",description:"Corte 3D minimalista com apenas linhas técnicas e sombreamento discreto. Estética limpa para apresentações modernas.",category:"Detalhe",tool:"Geral",tags:["corte 3D","minimalista","técnico","linhas","clean"]},
  {id:"p033",original:"Create a 3D floor plan with modern aesthetics, adding textures, fabrics, furniture and realistic shadows, without altering the original layout.",translation:"Crie uma planta 3D com estética moderna, adicionando texturas, tecidos, móveis e sombras realistas, sem alterar o layout original.",description:"Transforma planta baixa em planta 3D com móveis, texturas, tecidos e sombras realistas sem alterar o layout. Ideal para apresentações premium de imóveis.",category:"Interior",tool:"Geral",tags:["planta 3D","mobiliário","texturas","layout","imobiliário"]},
  {id:"p034",original:"Transforme este esboço arquitetônico em uma fotografia realista sem rótulos.",translation:"Transforme este esboço arquitetônico em uma fotografia realista sem rótulos.",description:"Transforma esboço arquitetônico em fotografia realista limpa, sem rótulos. Para transformar croquis em imagens profissionais rapidamente.",category:"Exterior",tool:"Geral",tags:["sketch to render","esboço","fotorrealismo","croqui"]},
  {id:"p035",original:"Substitua a fachada de vidro de um edifício pelo sistema de revestimento da segunda imagem, mantendo a proporção original.",translation:"Substitua a fachada de vidro de um edifício pelo sistema de revestimento da segunda imagem, mantendo a proporção original.",description:"Substitui o revestimento de fachada de vidro pelo material de uma imagem de referência, mantendo as proporções. Para estudos de fachada e aprovação de clientes.",category:"Exterior",tool:"Geral",tags:["fachada","revestimento","substituição","material","vidro"]},
  {id:"p036",original:"Transforme um modelo 3D em uma visualização arquitetônica profissional.",translation:"Transforme um modelo 3D em uma visualização arquitetônica profissional.",description:"Transforma modelo 3D bruto em visualização arquitetônica profissional com materiais e iluminação.",category:"Exterior",tool:"Geral",tags:["modelo 3D","visualização","render","profissional","arquitetura"]},
  {id:"p037",original:"Transforme a captura de um modelo 3D em fotografia realista usando aço pintado, madeira e alumínio, mantendo o mesmo enquadramento.",translation:"Transforme a captura de um modelo 3D em fotografia realista usando aço pintado, madeira e alumínio, mantendo o mesmo enquadramento.",description:"Transforma captura de modelo 3D em fotografia realista com materiais específicos (aço, madeira, alumínio) mantendo o enquadramento original.",category:"Exterior",tool:"Geral",tags:["screenshot to render","materiais","aço","madeira","fotorrealismo"]},
  {id:"p038",original:"Altere o estilo de uma imagem para corresponder ao estilo de uma imagem de referência.",translation:"Altere o estilo de uma imagem para corresponder ao estilo de uma imagem de referência.",description:"Transfere o estilo visual de uma imagem de referência para outra imagem. Útil para padronizar a estética de um portfólio.",category:"Geral",tool:"Geral",tags:["transferência de estilo","estilo","referência"]},
  {id:"p039",original:"Vista exterior de una casa moderna y lujosa construida con madera natural y piedra, situada sobre una platea de hormigón, rodeada de abundante vegetación verde y árboles, con un auto moderno estacionado en la entrada, luz cálida del atardecer, sombras suaves, reflejos realistas en las ventanas, fotografía arquitectónica tomada con cámara DSLR, alto nivel de detalle, textura realista de materiales, ambiente tranquilo y elegante.",translation:"Vista exterior de uma casa moderna e luxuosa construída com madeira natural e pedra, situada sobre laje de concreto, cercada por vegetação verde abundante e árvores, com carro moderno estacionado na entrada, luz quente do pôr do sol, sombras suaves, reflexos realistas nas janelas, fotografia arquitetônica com câmera DSLR, alto nível de detalhe, texturas realistas, ambiente tranquilo e elegante.",description:"Vista exterior de casa de luxo em madeira natural e pedra, com vegetação exuberante, carro moderno e luz quente do pôr do sol. Estética fotográfica DSLR. (Prompt original em espanhol)",category:"Exterior",tool:"Geral",tags:["madeira","pedra","luxo","exterior","pôr do sol","DSLR","residencial"]},
  {id:"p040",original:"Overlay the architectural masterplan precisely onto the provided aerial photograph of untouched terrain, using exact scale, geographic alignment and orientation. Render roads, blocks, lots, roundabouts and building footprints as thin clean technical outline linework with soft neon green glow and subtle cyan accents. Add vertical light pillars at key nodes: main entrances, roundabouts, central avenue intersections. Light pillars: perfectly vertical, subtle and low opacity, grounded to terrain. Linework fully integrated with terrain, following slopes and natural contours. Add very subtle topographic contour lines. Forest vegetation, coastline, soil textures remain completely visible and unmodified. Strict orthographic top-down view, no camera movement or perspective distortion.",translation:"Sobreponha o masterplan arquitetônico com precisão sobre a fotografia aérea do terreno intocado. Renderize vias, quadras, lotes, rotatórias e implantações como linhas técnicas finas com brilho neon verde suave e acentos ciano sutis. Adicione pilares de luz verticais nos nós principais. Toda linhas integradas ao terreno seguindo encostas e contornos naturais. Vegetação, linha costeira e texturas do solo completamente visíveis. Vista top-down estrita.",description:"Sobreposição precisa do masterplan com linhas neon verde e pilares de luz sobre foto aérea real do terreno. Para apresentações de loteamentos e projetos urbanísticos de alto padrão.",category:"Aéreo",tool:"Geral",tags:["masterplan","neon verde","top-down","sobreposição","loteamento","urbanismo"]},
  {id:"p041",original:"Ultra-clean wide 3D architectural visualization showing four perfectly aligned versions of the same two-story residential house side by side. All four from exact same left-angled diagonal camera view. Version 01: SketchUp-style massing with flat solid colors. Version 02: Structural model showing beams, columns, slabs in semi-transparent technical style. Version 03: Electrical MEP systems over translucent volume with conduits, wiring, panels. Version 04: Plumbing MEP systems with water supply, drainage, sewage in contrasting technical colors. Clean BIM/MEP style, soft neutral ambient lighting, pure white background. Portuguese technical annotations.",translation:"Visualização 3D limpa com quatro versões alinhadas do mesmo edifício residencial de dois andares. Versão 01: modelo de massas SketchUp com cores sólidas. Versão 02: modelo estrutural com vigas, pilares e lajes semitransparentes. Versão 03: sistemas elétricos MEP. Versão 04: sistemas hidráulicos MEP. Estilo BIM técnico, fundo branco, anotações técnicas em português.",description:"Quatro versões do mesmo edifício num único render: massa, estrutura, instalações elétricas e hidráulicas. Com anotações técnicas em português. Para apresentações BIM completas.",category:"Detalhe",tool:"Geral",tags:["BIM","detalhamento","estrutural","hidráulica","elétrica","MEP","técnico"]},
  {id:"p042",original:"Create a high-end architectural editorial collage mood board. Use only the provided black-and-white technical architectural drawing as base layer — must remain 100% intact, all linework, dimensions, symbols and annotations fully visible. Extract individual elements from the realistic reference image as independent ultra-realistic cut-outs: sofa, armchairs, tables, rugs, pendant light, decorative objects. Rescale and relocate all elements to new positions. Result must read clearly as architectural collage, not realistic interior scene. Floating editorial layout. Overlay circular material swatches. Neutral beige palette. No people, no added text.",translation:"Crie um moodboard collage editorial arquitetônico de alto padrão. Use o desenho técnico arquitetônico em P&B como camada base intacta com todas as linhas e cotas visíveis. Extraia recortes ultra-realistas individuais da imagem realista de referência: sofá, poltronas, mesas, tapetes, luminária, objetos decorativos. Redimensione e reposicione todos os elementos. Layout editorial flutuante. Amostras circulares de materiais. Paleta bege neutra.",description:"Moodboard editorial arquitetônico colagem combinando planta técnica em P&B com recortes fotorrealistas de móveis e amostras circulares de materiais. Para apresentações de design de interiores.",category:"Interior",tool:"Geral",tags:["moodboard","editorial","collage","interior","materiais","planta técnica"]},
  {id:"p043",original:"Insert a three-dimensional white solid text into the scene, physically placed on the ground or attached to the facade, respecting real-world perspective and vanishing points. Text must look like solid white box structure: clean matte finish, realistic thickness (minimum 20cm depth), subtle bevel edges, physically accurate scale proportional to environment. Apply natural daylight reflections and soft global illumination. Generate realistic ground contact shadows, ambient occlusion between letters and terrain. Letters must interact with terrain (slightly embedded if on grass or soil). Camera depth of field consistent with original scene. Cinematic realism, no floating effect, no glow, no artificial outlines.",translation:"Insira texto 3D branco sólido na cena, fisicamente posicionado no solo ou fixado à fachada, respeitando perspectiva e pontos de fuga reais. O texto deve parecer estrutura sólida em caixa branca: acabamento fosco limpo, espessura mínima de 20cm, bordas com chanfro sutil, escala precisa ao ambiente. Aplique reflexos de luz natural e iluminação global suave. Gere sombras de contato realistas com o solo. Realismo cinematográfico, sem efeito flutuante, sem brilho artificial.",description:"Texto 3D branco sólido integrado fisicamente ao ambiente com perspectiva real, sombras de contato e materiais realistas. Para inserir nome ou metragem do empreendimento numa cena fotorrealista.",category:"Texto/Animação",tool:"Geral",tags:["texto 3D","branco","integrado","sombras","fotorrealismo","perspectiva"]},
  {id:"p044",original:"A wide-angle, high-altitude aerial drone photograph of a luxurious coastal estate at a diagonal oblique angle. Large beachfront property with main villa featuring solar panels, multiple blue swimming pools with lounge chairs and white umbrellas, and two tennis courts (one green, one clay red). Dense diverse landscaping with succulents, palm trees, green shrubs, sandy paths and natural dunes. To the right, golden sand beach meets clear turquoise ocean with gentle white waves. Perspective pulled back significantly to show scale of terrain and coastline. Bright, cinematic natural sunlight.",translation:"Fotografia aérea de drone em grande angular, de grande altitude, de uma propriedade costeira luxuosa em ângulo oblíquo diagonal. Grande propriedade à beira-mar com villa principal com painéis solares, múltiplas piscinas azuis, espreguiçadeiras, guarda-sóis brancos e duas quadras de tênis. Paisagismo denso com suculentas, palmeiras, arbustos verdes, caminhos de areia e dunas naturais. À direita, praia de areia dourada encontra oceano turquesa claro.",description:"Vista aérea de drone oblíqua diagonal de propriedade costeira de luxo mostrando escala do terreno, piscinas, quadras de tênis e praia. Para apresentações de terrenos e empreendimentos premium.",category:"Aéreo",tool:"Geral",tags:["drone","aéreo","oblíquo","propriedade costeira","luxo","piscina","praia"]},
  {id:"p045",original:"Coloque na imagem em texto caixa 3D em pé, fonte branca, apoiado ao solo no centro do terreno a mentragem: 78.177,00M²",translation:"Coloque na imagem em texto caixa 3D em pé, fonte branca, apoiado ao solo no centro do terreno a mentragem: 78.177,00M²",description:"Insere texto 3D branco em caixa alta apoiado ao solo mostrando a metragem do terreno no centro da imagem. Para apresentação de terrenos com tamanho destacado.",category:"Texto/Animação",tool:"Geral",tags:["texto 3D","metragem","terreno","branco","numeração"]},
  {id:"p046",original:"Overlay the exact original lot layout over the real terrain, perfectly aligned and undistorted. Preserve all original lines, proportions and geometry of the subdivision plan. Add a subtle neon orange glow outline following precisely the lot boundaries, with soft vertical light pillars rising from the perimeter. Futuristic yet realistic architectural visualization, premium real estate style, cinematic lighting, night blue environment, high contrast, smooth glow, no changes to lot information, no text added, ultra clean, professional visualization.",translation:"Sobreponha o layout exato dos lotes sobre o terreno real, perfeitamente alinhado e sem distorção. Preserve todas as linhas, proporções e geometria do plano de loteamento. Adicione contorno neon laranja suave seguindo os limites dos lotes, com pilares de luz verticais suaves subindo do perímetro. Visualização futurista mas realista, estilo imobiliário premium, iluminação cinematográfica, ambiente azul noturno, alto contraste.",description:"Sobreposição do mapa de loteamento sobre terreno real com contorno neon laranja e pilares de luz, em ambiente noturno azul. Estética futurista premium para apresentações de loteamentos.",category:"Aéreo",tool:"Geral",tags:["loteamento","neon laranja","noturno","futurista","sobreposição","premium"]},
  {id:"p047",original:"Use the provided image as the exact geometric reference. Reconstruct the same terrain faithfully preserving all proportions, boundaries, coastline shape, vegetation, paths, roads, buildings, parking, pool, dunes and topography. Change camera from top-down nadir view to realistic cinematic drone perspective, approximately 45-degree pitch, positioned in front of the terrain, capturing the site from a diagonal three-quarter corner angle, showing both front boundary and one lateral side, clearly revealing depth and scale. Moderate focal length (28-35mm equivalent). Natural horizon placement, true-to-life daylight colors. Output in vertical 9:16.",translation:"Use a imagem fornecida como referência geométrica exata. Reconstrua o mesmo terreno fielmente, preservando todas as proporções, limites, forma da costa, vegetação, caminhos, vias, edifícios, estacionamentos, piscina, dunas e topografia. Mude a câmera de vista top-down estrita para perspectiva de drone cinematográfico de 45 graus, posicionada na frente do terreno, capturando o local de ângulo diagonal de três quartos. Focal 28-35mm. Formato vertical 9:16.",description:"Transforma vista top-down do terreno em perspectiva de drone a 45° diagonal, formato 9:16, preservando fielmente todas as características. Para adaptar imagens de satélite para Reels.",category:"Aéreo",tool:"Geral",tags:["drone 45°","9:16","perspectiva diagonal","terreno","Reels","top-down para oblíquo"]},
  {id:"p048",original:"\"Isometric 3D architectural white model of [INSIRA A DESCRIÇÃO DA SUA CASA AQUI], minimalist clay render style. The image features a technical solar path diagram with golden yellow arcs showing the sun's trajectory and position at different times of day over the building. A compass rose is visible on the ground. Clean white background, soft studio lighting, high resolution, architectural visualization.\"",translation:"\"Modelo 3D arquitetônico branco isométrico de [INSIRA A DESCRIÇÃO DA SUA CASA AQUI], estilo clay render minimalista. A imagem apresenta um diagrama técnico de trajetória solar com arcos dourados mostrando a trajetória e posição do sol em diferentes horários do dia sobre o edifício. Uma rosa dos ventos é visível no solo. Fundo branco limpo, iluminação de estúdio suave, alta resolução.\"",description:"⚠️ SUBSTITUA [INSIRA A DESCRIÇÃO DA SUA CASA AQUI] antes de usar. Diagrama de trajetória solar em 3D isométrico estilo clay render branco, com arcos dourados do sol e rosa dos ventos.",category:"Detalhe",tool:"Geral",tags:["mapa solar","trajetória solar","isométrico","clay render","bioclimático","diagrama"]},
  {id:"p049",original:"Transforme o modelo em uma visualização futurista de planta arquitetônica holográfica. Preserve a estrutura exata, proporções, ângulo da câmera e paisagismo da casa original. Converta toda a arquitetura em wireframe brilhante com contornos de neon branco e laranja, superfícies translúcidas e forte brilho holográfico. Adicione balões de texto flutuantes com imagens realistas do interior de diferentes cômodos (sala, cozinha, quarto, banheiro), com bordas neon laranja-esbranquiçadas e linhas técnicas pontilhadas conectando cada balão à área correspondente. Inclua elementos de UI técnica: medidas, anotações esquemáticas e sobreposições de interface. Fundo azul escuro noturno, alto contraste, sci-fi cinematográfico, ultradetalhado.",translation:"Transforme o modelo em uma visualização futurista de planta arquitetônica holográfica. Preserve a estrutura exata, proporções, ângulo da câmera e paisagismo da casa original. Converta toda a arquitetura em wireframe brilhante com contornos de neon branco e laranja, superfícies translúcidas e forte brilho holográfico. Adicione balões de texto flutuantes com imagens realistas do interior de diferentes cômodos. Inclua elementos de UI técnica. Fundo azul escuro noturno, alto contraste, sci-fi cinematográfico.",description:"Transforma a casa num holograma arquitetônico futurista com wireframe neon, balões flutuantes mostrando interiores dos cômodos e elementos de UI técnica. Estética sci-fi noturna.",category:"Texto/Animação",tool:"Geral",tags:["holograma","wireframe","neon","futurista","sci-fi","interior","balões flutuantes","NEOM"]},
  {id:"p050",original:"Ultra-realistic lifestyle photograph of a woman immersed in a luxury infinity pool at sunset, vertical composition (9:16). Natural human skin rendered with extreme realism, fully preserved texture and micro-details. Visible skin pores, subtle natural oil sheen, realistic water refraction on submerged skin areas. The subject is calmly leaning against the pool edge, holding a transparent wine glass with rosé wine. Pool water rendered with physically accurate reflections, refractions, light caustics, soft ripples around the body. Background: modern luxury residence architecture softly out of focus, palm trees and landscaped garden. Golden hour sunset lighting. Lens: full-frame camera, medium telephoto lens (85-100mm equivalent), shallow depth of field. Photorealistic, editorial luxury lifestyle photography. Medical-grade skin realism. No stylization, no CGI look, no AI artifacts.",translation:"Fotografia lifestyle ultra-realista de uma mulher imersa em piscina infinita de luxo ao pôr do sol, composição vertical (9:16). Pele humana natural com realismo extremo: poros visíveis nos ombros, clavícula e rosto, brilho natural sutil, pelos finos captando a luz, refração realista da água na pele submersa. A modelo apoia-se relaxadamente na borda da piscina segurando uma taça de vinho rosé. Pele das mãos com linhas naturais, sem suavização. Cabelo molhado com mechas individuais definidas. Água com reflexos, refrações e cáusticas fisicamente precisas. Ao fundo: arquitetura residencial de luxo desfocada, palmeiras e jardim. Luz golden hour, lente 85-100mm, rasa profundidade de campo. Sem retoques, sem filtros.",description:"Fotografia lifestyle ultra-realista de mulher em piscina infinita de luxo ao pôr do sol, 9:16, com realismo de pele médico-grau e água fisicamente precisa. Para marketing de alto padrão.",category:"Exterior",tool:"Geral",tags:["lifestyle","piscina infinita","pôr do sol","luxo","9:16","ultra-realista","golden hour","editorial"]},

  {id:"p053",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"architectural hologram wireframe\",\n\"prompt\": \"Criar apenas o holograma arquitetônico da casa moderna em estilo wireframe técnico, sem construção sólida e sem volumetria real renderizada. A casa deve ser formada exclusivamente por linhas luminosas brancas e azul-ciano, estilo malha 3D (wireframe), com transparência total, sem superfícies preenchidas. Incluir linhas de cota arquitetônica, marcações dimensionais, indicação de rooftop terrace, corte técnico seção A-A e planta baixa em miniatura ao lado, todos também em wireframe luminoso. A casa deve parecer uma projeção holográfica flutuando levemente acima do terreno.\",\n\"negative_prompt\": \"no solid house, no real materials, no concrete, no glass reflections, no realistic finished house, no interior furniture rendered, no textured surfaces\",\n\"lighting\": \"low ambient light to enhance hologram glow\",\n\"effects\": \"soft glow lines, particle sparks subtle, light bloom\",\n\"contrast\": \"high contrast for wireframe visibility\",\n\"detail_level\": \"high technical precision\"\n}",translation:"Casa holograma V1 técnico — Nano Banana. Copiar o JSON completo.",description:"Casa holograma V1 — wireframe técnico puro: linhas brancas e azul-ciano flutuando sobre o terreno, com cotas arquitetônicas, corte A-A e planta baixa em miniatura. Alta precisão técnica. Nano Banana.",category:"Texto/Animação",tool:"Nano Banana",tags:["casa holograma","wireframe","técnico","blueprint","ciano","Nano Banana","V1","cotas"]},

  {id:"p055",original:"{\n\"model\": \"nano-banana\",\n\"type\": \"image-to-image\",\n\"style\": \"ultra luxury futuristic architectural hologram\",\n\"prompt\": \"Criar um holograma arquitetônico premium de uma residência moderna de alto padrão, formado exclusivamente por linhas wireframe luminosas em branco frio e azul-ciano. A casa deve ser 100% holográfica. Linhas arquitetônicas finas e precisas definindo pavimentos, lajes, esquadrias, rooftop terrace e garagem. Inserir pequenos painéis flutuantes translúcidos ao redor com informações minimalistas como 'TOTAL AREA 480 m²' e '3 STORIES', além de corte técnico e planta baixa em wireframe. Fundo escurecido, iluminação baixa, glow elegante. Estética Apple Vision Pro.\",\n\"negative_prompt\": \"no solid house, no realistic textures, no concrete, no wood, no glass reflections, no photoreal materials\",\n\"lighting\": \"low ambient cinematic dusk lighting\",\n\"effects\": \"clean soft glow, subtle bloom, volumetric light, floating UI panels\",\n\"contrast\": \"high contrast to enhance hologram visibility\",\n\"detail_level\": \"high precision\",\n\"aspect_ratio\": \"9:16\"\n}",translation:"Casa holograma V4 Black ultra luxury — Nano Banana. Copiar o JSON completo.",description:"Casa holograma V4 Black — ultra luxury: wireframe branco frio e ciano com painéis UI flutuantes (área total, andares), planta e corte técnico. Estética Apple Vision Pro. Nano Banana.",category:"Texto/Animação",tool:"Nano Banana",tags:["casa holograma","ultra luxury","branco frio","ciano","UI flutuante","Apple Vision Pro","Nano Banana","V4"]}
];

const CATEGORIES = ['Todos','Exterior','Interior','Aéreo','Movimento','Detalhe','Texto/Animação','Geral'];
const TOOLS = ['Todos','Kling','Nano Banana','VEO3/VO3','Sora','HeyGen','Grok','Geral'];

const CAT_COLORS = {
  Exterior:{bg:'var(--ext-bg)',color:'var(--ext)'},Interior:{bg:'var(--int-bg)',color:'var(--int)'},
  Aéreo:{bg:'var(--aer-bg)',color:'var(--aer)'},Movimento:{bg:'var(--mov-bg)',color:'var(--mov)'},
  Detalhe:{bg:'var(--det-bg)',color:'var(--det)'},'Texto/Animação':{bg:'var(--ani-bg)',color:'var(--ani)'},
  Geral:{bg:'var(--ger-bg)',color:'var(--ger)'}
};
const TOOL_COLORS = {
  Kling:{bg:'var(--aer-bg)',color:'var(--aer)'},'Nano Banana':{bg:'var(--nan-bg)',color:'var(--nan)'},
  'VEO3/VO3':{bg:'var(--int-bg)',color:'var(--int)'},Sora:{bg:'var(--det-bg)',color:'var(--det)'},
  HeyGen:{bg:'var(--mov-bg)',color:'var(--mov)'},Grok:{bg:'var(--ext-bg)',color:'var(--ext)'},
  Geral:{bg:'var(--ger-bg)',color:'var(--ger)'}
};

let state = {
  prompts: [],
  view: 'list',
  search: '',
  selCat: 'Todos',
  selTool: 'Todos',
  expandedId: null,
  editingId: null,
  editDraft: {},
  varId: null,
  varText: '',
  newText: '',
  analyzing: false,
  analysis: null,
  analysisErr: null,
  copiedKey: null,
};

function loadPrompts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function savePrompts(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

function badge(label, map) {
  const s = map[label] || {bg:'var(--ger-bg)',color:'var(--ger)'};
  return `<span class="badge" style="background:${s.bg};color:${s.color}">${label}</span>`;
}

function tagPill(t) {
  return `<span class="tag">#${t}</span>`;
}

function copyBtn(text, key, label='Copiar') {
  const copied = state.copiedKey === key;
  return `<button onclick="doCopy(${JSON.stringify(text)},${JSON.stringify(key)})" style="font-size:11px;padding:3px 10px;color:${copied?'var(--accent)':'var(--text3)'};border-color:${copied?'var(--accent)':'var(--border)'}">${copied?'✓ Copiado':label}</button>`;
}

function sectionBlock(label, text, key, extra='') {
  return `
  <div class="section-block">
    <div class="section-block-header">
      <span class="label" style="margin:0">${label}</span>
      <div style="display:flex;gap:5px">${extra}${copyBtn(text,key)}</div>
    </div>
    <pre>${escHtml(text)}</pre>
  </div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getFiltered() {
  const q = state.search.toLowerCase();
  return state.prompts.filter(p => {
    const mq = !q || (p.description||'').toLowerCase().includes(q) ||
      (p.original||'').toLowerCase().includes(q) || (p.translation||'').toLowerCase().includes(q) ||
      (p.tags||[]).some(t=>t.toLowerCase().includes(q));
    const mc = state.selCat==='Todos' || p.category===state.selCat;
    const mt = state.selTool==='Todos' || p.tool===state.selTool;
    return mq && mc && mt;
  });
}

function filterBtn(item, sel, map) {
  const s = map[item];
  const active = sel===item;
  const bg = active && s ? s.bg : 'transparent';
  const color = active && s ? s.color : 'var(--text3)';
  const border = active && s ? s.color : 'var(--border)';
  return `<button class="filter-btn${active?' active':''}" style="background:${bg};color:${color};border-color:${border}" onclick="setFilter('${item}','${sel===state.selCat?'cat':'tool'}')">${item}</button>`;
}

function renderCard(p) {
  const isExp = state.expandedId === p.id;
  const isEdit = state.editingId === p.id;
  const isVar = state.varId === p.id;
  const tags = (p.tags||[]).map(tagPill).join(' ');

  let inner = `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
    <div style="flex:1;min-width:0">
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">${badge(p.category,CAT_COLORS)}${badge(p.tool,TOOL_COLORS)}</div>
      <p style="font-size:13px;font-weight:500;line-height:1.5;color:var(--text);margin-bottom:${tags?'8px':'0'}">${escHtml(p.description)}</p>
      ${tags?`<div style="display:flex;gap:5px;flex-wrap:wrap">${tags}</div>`:''}
    </div>
    <div style="display:flex;gap:5px;flex-shrink:0">
      ${copyBtn(p.original, p.id+'-copy')}
      <button onclick="toggleExpand('${p.id}')" style="font-size:11px;padding:3px 10px;color:${isExp?'var(--accent)':'var(--text3)'};border-color:${isExp?'var(--accent)':'var(--border)'}">${isExp?'Fechar':'Ver'}</button>
    </div>
  </div>`;

  if (isExp) {
    if (isEdit) {
      const d = state.editDraft;
      const catOpts = CATEGORIES.filter(c=>c!=='Todos').map(c=>`<option${c===d.category?' selected':''}>${c}</option>`).join('');
      const toolOpts = TOOLS.filter(t=>t!=='Todos').map(t=>`<option${t===d.tool?' selected':''}>${t}</option>`).join('');
      inner += `
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
        <label class="label">Descrição</label>
        <textarea oninput="editField('description',this.value)" rows="2" style="margin-bottom:10px">${escHtml(d.description)}</textarea>
        <label class="label">Categoria</label>
        <select onchange="editField('category',this.value)" style="margin-bottom:10px">${catOpts}</select>
        <label class="label">Ferramenta</label>
        <select onchange="editField('tool',this.value)" style="margin-bottom:10px">${toolOpts}</select>
        <label class="label">Tags (separadas por vírgula)</label>
        <input value="${escHtml(d.tags)}" oninput="editField('tags',this.value)" style="margin-bottom:14px"/>
        <div style="display:flex;gap:8px"><button class="primary" onclick="saveEdit()">Salvar</button><button onclick="cancelEdit()">Cancelar</button></div>
      </div>`;
    } else {
      let expanded = `<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">`;
      expanded += sectionBlock('Prompt original', p.original, p.id+'-orig');
      if (p.translation && p.translation !== p.original) {
        expanded += sectionBlock('Tradução (PT-BR)', p.translation, p.id+'-pt');
      }
      if ((p.variations||[]).length > 0) {
        expanded += `<div class="section-block"><span class="label">Variações</span>`;
        p.variations.forEach((v,i) => {
          const delBtn = `<button onclick="deleteVar('${p.id}',${i})" style="font-size:11px;padding:3px 8px;color:var(--danger);border-color:var(--border)">Excluir</button>`;
          expanded += sectionBlock(`Variação ${i+1}`, v, p.id+'-var-'+i, delBtn);
        });
        expanded += `</div>`;
      }
      if (isVar) {
        expanded += `
        <div style="margin-bottom:14px">
          <label class="label">Nova variação</label>
          <textarea oninput="state.varText=this.value" rows="3" placeholder="Digite o prompt variante..." style="margin-bottom:8px"></textarea>
          <div style="display:flex;gap:8px">
            <button class="primary" onclick="saveVar('${p.id}')">Salvar</button>
            <button onclick="cancelVar()">Cancelar</button>
          </div>
        </div>`;
      }
      expanded += `<div class="actions">
        <button onclick="startEdit('${p.id}')" style="font-size:11px">Editar</button>
        ${!isVar?`<button onclick="startVar('${p.id}')" style="font-size:11px">+ Variação</button>`:''}
        <button onclick="deletePrompt('${p.id}')" style="font-size:11px;color:var(--danger);border-color:var(--border);margin-left:auto">Excluir</button>
      </div></div>`;
      inner += expanded;
    }
  }

  return `<div class="card${isExp?' open':''}">${inner}</div>`;
}

function renderFilters() {
  const catBtns = CATEGORIES.map(c=>{
    const s=CAT_COLORS[c]; const active=state.selCat===c;
    const bg=active&&s?s.bg:'transparent'; const color=active&&s?s.color:'var(--text3)'; const border=active&&s?s.color:'var(--border)';
    return `<button class="filter-btn${active?' active':''}" style="background:${bg};color:${color};border-color:${border}" onclick="setCat('${c}')">${c}</button>`;
  }).join('');
  const toolBtns = TOOLS.map(t=>{
    const s=TOOL_COLORS[t]; const active=state.selTool===t;
    const bg=active&&s?s.bg:'transparent'; const color=active&&s?s.color:'var(--text3)'; const border=active&&s?s.color:'var(--border)';
    return `<button class="filter-btn${active?' active':''}" style="background:${bg};color:${color};border-color:${border}" onclick="setTool('${t}')">${t}</button>`;
  }).join('');
  return `
  <div class="filter-row"><span class="filter-label">Cat.</span>${catBtns}</div>
  <div class="filter-row"><span class="filter-label">Tool</span>${toolBtns}</div>`;
}

function renderAddPanel() {
  const a = state.analysis;
  return `
  <div class="add-panel">
    <label class="label">Cole o prompt (inglês ou português)</label>
    <textarea oninput="state.newText=this.value" placeholder="Paste your prompt here..." style="min-height:140px;font-family:'DM Mono',monospace;font-size:12px;margin-bottom:12px">${escHtml(state.newText)}</textarea>
    <button class="primary" onclick="analyzePrompt()" ${!state.newText.trim()||state.analyzing?'disabled':''} style="width:100%;padding:10px;font-size:13px">
      ${state.analyzing?'Analisando com IA...':'Analisar e traduzir automaticamente'}
    </button>
    ${state.analysisErr?`<p style="color:var(--danger);font-size:12px;margin-top:8px">${state.analysisErr}</p>`:''}
    ${a?`
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:20px">
      <div class="info-row"><span class="label">Tradução</span><p>${escHtml(a.translation)}</p></div>
      <div class="info-row"><span class="label">Descrição</span><p>${escHtml(a.description)}</p></div>
      <div style="margin-bottom:12px">
        <span class="label">Categoria · Ferramenta</span>
        <div style="display:flex;gap:6px;margin-top:5px">${badge(a.category,CAT_COLORS)}${badge(a.tool,TOOL_COLORS)}</div>
      </div>
      ${a.tags?.length?`<div style="margin-bottom:16px"><span class="label">Tags</span><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">${a.tags.map(tagPill).join(' ')}</div></div>`:''}
      <button class="primary" onclick="saveNew()" style="width:100%;padding:10px">Salvar na biblioteca</button>
    </div>`:''}
  </div>`;
}

function render() {
  const filtered = getFiltered();
  const app = document.getElementById('app');

  const listCards = filtered.length===0
    ? `<div class="empty"><p style="font-size:15px;margin-bottom:6px">${state.prompts.length===0?'Nenhum prompt salvo':'Nenhum resultado'}</p><p style="font-size:12px">${state.prompts.length===0?'Clique em + Novo prompt para começar.':'Tente outros filtros.'}</p></div>`
    : filtered.map(renderCard).join('');

  app.innerHTML = `
  <div class="sticky-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px">
      <div>
        <h1 style="font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1">
          Biblioteca de Prompts <span style="color:var(--accent)">·</span>
        </h1>
        <div class="stats">
          <span class="stat"><span>${state.prompts.length}</span> prompts</span>
          <span class="stat"><span>${state.prompts.filter(p=>p.tool==='Kling').length}</span> Kling</span>
          <span class="stat"><span>${state.prompts.filter(p=>p.tool==='Nano Banana').length}</span> Nano Banana</span>
        </div>
      </div>
      <button class="${state.view==='add'?'':'primary'}" onclick="toggleView()" style="font-size:12px;font-weight:600">
        ${state.view==='add'?'Cancelar':'+ Novo prompt'}
      </button>
    </div>
    ${state.view==='list'?`
    <input type="text" value="${escHtml(state.search)}" oninput="setSearch(this.value)" placeholder="Buscar por descrição, tag ou palavra-chave..." style="margin-bottom:10px"/>
    ${renderFilters()}`:''}
  </div>
  ${state.view==='add'?renderAddPanel():''}
  ${state.view==='list'?`<div style="margin-top:20px">${listCards}</div>`:''}`;
}

// Actions
window.toggleView = () => { state.view=state.view==='add'?'list':'add'; state.analysis=null; state.newText=''; render(); };
window.setSearch = (v) => { state.search=v; render(); };
window.setCat = (v) => { state.selCat=v; render(); };
window.setTool = (v) => { state.selTool=v; render(); };
window.toggleExpand = (id) => { state.expandedId=state.expandedId===id?null:id; state.editingId=null; state.varId=null; render(); };
window.doCopy = (text, key) => {
  navigator.clipboard.writeText(text);
  state.copiedKey=key; render();
  setTimeout(()=>{ state.copiedKey=null; render(); }, 2000);
};
window.startEdit = (id) => {
  const p = state.prompts.find(x=>x.id===id);
  state.editingId=id; state.editDraft={description:p.description,category:p.category,tool:p.tool,tags:(p.tags||[]).join(', ')};
  render();
};
window.editField = (field, val) => { state.editDraft[field]=val; };
window.cancelEdit = () => { state.editingId=null; render(); };
window.saveEdit = () => {
  state.prompts = state.prompts.map(p=>p.id!==state.editingId?p:{
    ...p, description:state.editDraft.description, category:state.editDraft.category,
    tool:state.editDraft.tool, tags:state.editDraft.tags.split(',').map(t=>t.trim()).filter(Boolean)
  });
  savePrompts(state.prompts); state.editingId=null; render();
};
window.deletePrompt = (id) => {
  if(!confirm('Excluir este prompt?')) return;
  state.prompts = state.prompts.filter(p=>p.id!==id);
  savePrompts(state.prompts); state.expandedId=null; render();
};
window.startVar = (id) => { state.varId=id; state.varText=''; render(); };
window.cancelVar = () => { state.varId=null; state.varText=''; render(); };
window.saveVar = (id) => {
  if(!state.varText.trim()) return;
  state.prompts = state.prompts.map(p=>p.id!==id?p:{...p,variations:[...(p.variations||[]),state.varText.trim()]});
  savePrompts(state.prompts); state.varId=null; state.varText=''; render();
};
window.deleteVar = (pid, idx) => {
  state.prompts = state.prompts.map(p=>p.id!==pid?p:{...p,variations:p.variations.filter((_,i)=>i!==idx)});
  savePrompts(state.prompts); render();
};
window.analyzePrompt = async () => {
  if(!state.newText.trim()||state.analyzing) return;
  state.analyzing=true; state.analysis=null; state.analysisErr=null; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:'Você é especialista em prompts de vídeo/imagem imobiliário com IA. Analise o prompt e retorne APENAS JSON válido, sem texto extra, sem markdown. Estrutura exata: {"translation":"tradução fiel ao português brasileiro","description":"em 1 ou 2 frases: o que este prompt produz e quando usar","category":"Exterior|Interior|Aéreo|Movimento|Detalhe|Texto/Animação|Geral","tool":"Kling|VEO3/VO3|Sora|HeyGen|Grok|Nano Banana|Geral","tags":["até 5 tags relevantes em português sem #"]}',
      messages:[{role:'user',content:state.newText.trim()}]
    })});
    const data = await res.json();
    const raw = data.content?.[0]?.text||'';
    state.analysis = JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch { state.analysisErr='Erro ao analisar. Verifique sua conexão e tente novamente.'; }
  state.analyzing=false; render();
};
window.saveNew = () => {
  if(!state.analysis) return;
  const np = {id:'u'+Date.now(),original:state.newText.trim(),...state.analysis,variations:[],createdAt:new Date().toISOString()};
  state.prompts = [np,...state.prompts];
  savePrompts(state.prompts); state.newText=''; state.analysis=null; state.view='list'; render();
};

// Init
const saved = loadPrompts();
state.prompts = saved || PROMPTS_INICIAIS;
if(!saved) savePrompts(state.prompts);
render();
</script>
</body>
</html>
